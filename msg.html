<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages · KnowWhere</title>
  <link rel="icon" href="https://assets.cdn.filesafe.space/LiVJbIgv34a0ebVd0Lef/media/69c5fbcf5ebd49158a7811ff.png" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --card: #111118;
      --border: #222230;
      --primary: #a855f7;
      --primary-dim: rgba(168,85,247,0.15);
      --secondary: #22d3ee;
      --secondary-dim: rgba(34,211,238,0.15);
      --danger: #ef4444;
      --danger-dim: rgba(239,68,68,0.12);
      --text: #e2e8f0;
      --muted: #64748b;
      --font-display: 'Orbitron', sans-serif;
      --font-body: 'Inter', sans-serif;
    }

    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── AUTH WALL ── */
    #auth-wall {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    #auth-wall.hidden { display: none; }

    .auth-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 0 60px rgba(168,85,247,0.12);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }
    .auth-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }
    .auth-logo img { width: 48px; height: 48px; object-fit: contain; filter: drop-shadow(0 0 12px rgba(168,85,247,0.8)); }
    .auth-logo-name {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 900;
      letter-spacing: 0.05em;
    }
    .auth-logo-name span { color: var(--primary); }
    .auth-field { display: flex; flex-direction: column; gap: 0.4rem; width: 100%; }
    .auth-field label { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
    .auth-field input {
      width: 100%;
      background: #0d0d14;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-size: 0.95rem;
      font-family: var(--font-body);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .auth-field input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(168,85,247,0.15); }
    .auth-submit {
      width: 100%;
      padding: 0.85rem;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-family: var(--font-display);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(168,85,247,0.35);
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    }
    .auth-submit:hover { transform: scale(1.02); box-shadow: 0 0 32px rgba(168,85,247,0.6); }
    .auth-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .auth-error {
      width: 100%;
      background: var(--danger-dim);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 6px;
      padding: 0.65rem 1rem;
      color: var(--danger);
      font-size: 0.85rem;
      display: none;
    }
    .auth-error.show { display: block; }
    .auth-back {
      font-size: 0.75rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .auth-back:hover { color: var(--text); }

    /* ── NAV ── */
    nav {
      flex-shrink: 0;
      background: rgba(10,10,15,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      height: 56px;
      z-index: 100;
    }
    .nav-logo {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 1rem;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      color: var(--text);
    }
    .nav-logo span { color: var(--primary); }
    .nav-logo img { width: 28px; height: 28px; object-fit: contain; filter: drop-shadow(0 0 6px rgba(168,85,247,0.7)); }
    .nav-title {
      font-family: var(--font-display);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--secondary);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .nav-user-chip {
      font-family: var(--font-display);
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--primary);
      padding: 0.3rem 0.7rem;
      border: 1px solid rgba(168,85,247,0.35);
      border-radius: 6px;
      background: var(--primary-dim);
    }
    .nav-signout {
      font-family: var(--font-display);
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--muted);
      padding: 0.3rem 0.7rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: transparent;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    .nav-signout:hover { color: var(--danger); border-color: var(--danger); }

    /* ── MAIN LAYOUT ── */
    #app {
      display: none;
      flex: 1;
      overflow: hidden;
    }
    #app.visible {
      display: flex;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 280px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      background: var(--card);
      overflow: hidden;
    }
    .sidebar-head {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .sidebar-head-label {
      font-family: var(--font-display);
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .new-msg-btn {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.35rem 0.7rem;
      background: var(--primary-dim);
      border: 1px solid rgba(168,85,247,0.4);
      border-radius: 6px;
      color: var(--primary);
      font-family: var(--font-display);
      font-size: 0.55rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
    }
    .new-msg-btn:hover { background: rgba(168,85,247,0.25); box-shadow: 0 0 12px rgba(168,85,247,0.3); }

    .sidebar-search {
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    .sidebar-search input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.5rem 0.75rem 0.5rem 2rem;
      color: var(--text);
      font-size: 0.8rem;
      font-family: var(--font-body);
      outline: none;
      transition: border-color 0.2s;
    }
    .sidebar-search input:focus { border-color: var(--primary); }
    .sidebar-search input::placeholder { color: var(--muted); }
    .sidebar-search svg {
      position: absolute;
      left: 1.85rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    .conv-list {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(168,85,247,0.2) transparent;
    }
    .conv-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.85rem 1.25rem;
      cursor: pointer;
      border-bottom: 1px solid rgba(34,34,48,0.5);
      transition: background 0.15s;
      position: relative;
    }
    .conv-item:hover { background: rgba(168,85,247,0.05); }
    .conv-item.active { background: var(--primary-dim); border-left: 2px solid var(--primary); }
    .conv-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(168,85,247,0.3), rgba(34,211,238,0.3));
      border: 1px solid rgba(168,85,247,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--primary);
      flex-shrink: 0;
    }
    .conv-info { flex: 1; min-width: 0; }
    .conv-name {
      font-family: var(--font-display);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 0.2rem;
    }
    .conv-preview {
      font-size: 0.72rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .conv-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.3rem;
      flex-shrink: 0;
    }
    .conv-time {
      font-size: 0.62rem;
      color: var(--muted);
    }
    .unread-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--primary);
      box-shadow: 0 0 6px rgba(168,85,247,0.7);
    }
    .conv-empty {
      padding: 2rem 1.25rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.6;
    }

    /* ── CHAT PANE ── */
    .chat-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }
    .chat-pane-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      color: var(--muted);
    }
    .chat-pane-empty svg { opacity: 0.2; }
    .chat-pane-empty p { font-size: 0.85rem; }
    .chat-pane-empty strong { color: var(--primary); opacity: 0.7; font-family: var(--font-display); font-size: 0.7rem; letter-spacing: 0.1em; }

    .chat-header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: var(--card);
      flex-shrink: 0;
    }
    .chat-header-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(168,85,247,0.3), rgba(34,211,238,0.3));
      border: 1px solid rgba(168,85,247,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--primary);
    }
    .chat-header-name {
      font-family: var(--font-display);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--text);
    }
    .chat-header-sub {
      font-size: 0.68rem;
      color: var(--muted);
      margin-top: 0.1rem;
    }

    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      scrollbar-width: thin;
      scrollbar-color: rgba(168,85,247,0.15) transparent;
    }

    .msg-date-divider {
      text-align: center;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin: 0.5rem 0;
      position: relative;
    }
    .msg-date-divider::before, .msg-date-divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 30%;
      height: 1px;
      background: var(--border);
    }
    .msg-date-divider::before { left: 0; }
    .msg-date-divider::after { right: 0; }

    .msg-row {
      display: flex;
      gap: 0.6rem;
      max-width: 72%;
      animation: msgIn 0.2s ease;
    }
    @keyframes msgIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .msg-row.mine { align-self: flex-end; flex-direction: row-reverse; }
    .msg-row.theirs { align-self: flex-start; }

    .msg-avatar-sm {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(168,85,247,0.25), rgba(34,211,238,0.25));
      border: 1px solid rgba(168,85,247,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 0.55rem;
      font-weight: 700;
      color: var(--primary);
      flex-shrink: 0;
      align-self: flex-end;
    }

    .msg-bubble {
      padding: 0.65rem 0.9rem;
      border-radius: 14px;
      font-size: 0.875rem;
      line-height: 1.5;
      max-width: 100%;
      word-break: break-word;
    }
    .msg-row.mine .msg-bubble {
      background: linear-gradient(135deg, var(--primary), #9333ea);
      color: #fff;
      border-radius: 14px 14px 4px 14px;
      box-shadow: 0 2px 12px rgba(168,85,247,0.3);
    }
    .msg-row.theirs .msg-bubble {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 14px 14px 14px 4px;
    }
    .msg-time {
      font-size: 0.6rem;
      color: rgba(255,255,255,0.5);
      margin-top: 0.3rem;
      display: block;
      text-align: right;
    }
    .msg-row.theirs .msg-time { color: var(--muted); text-align: left; }

    /* ── MESSAGE INPUT ── */
    .msg-input-area {
      border-top: 1px solid var(--border);
      padding: 1rem 1.5rem;
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
      background: var(--card);
      flex-shrink: 0;
    }
    .msg-input-area textarea {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-size: 0.9rem;
      font-family: var(--font-body);
      outline: none;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
      transition: border-color 0.2s;
      scrollbar-width: thin;
    }
    .msg-input-area textarea:focus { border-color: var(--primary); }
    .msg-input-area textarea::placeholder { color: var(--muted); }
    .send-btn {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      background: var(--primary);
      border: none;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 0 16px rgba(168,85,247,0.4);
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    }
    .send-btn:hover { transform: scale(1.08); box-shadow: 0 0 24px rgba(168,85,247,0.6); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* ── NEW CONVERSATION MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      display: none;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.75rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 0 60px rgba(168,85,247,0.15);
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .modal-title {
      font-family: var(--font-display);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--primary);
    }
    .modal-input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-size: 0.9rem;
      font-family: var(--font-body);
      outline: none;
      width: 100%;
      transition: border-color 0.2s;
    }
    .modal-input:focus { border-color: var(--primary); }
    .modal-input::placeholder { color: var(--muted); }
    .user-results {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      max-height: 320px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(168,85,247,0.2) transparent;
    }
    .user-result-item {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.6rem 0.75rem;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      border: 1px solid transparent;
    }
    .user-result-item:hover { background: var(--primary-dim); border-color: rgba(168,85,247,0.3); }
    .user-result-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(168,85,247,0.25), rgba(34,211,238,0.25));
      border: 1px solid rgba(168,85,247,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 0.6rem;
      font-weight: 700;
      color: var(--primary);
      flex-shrink: 0;
    }
    .user-result-name {
      font-family: var(--font-display);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--text);
    }
    .user-result-email { font-size: 0.7rem; color: var(--muted); }
    .modal-actions { display: flex; gap: 0.5rem; }
    .modal-cancel-btn {
      flex: 1;
      padding: 0.6rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-family: var(--font-display);
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
    }
    .modal-error { font-size: 0.78rem; color: var(--danger); display: none; }
    .modal-error.show { display: block; }

    /* ── LOADING ── */
    .loading-spinner {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      color: var(--muted);
      font-size: 0.8rem;
      gap: 0.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }

    .back-btn { display: none; }

    /* ── RESPONSIVE / MOBILE ── */

    /* Safe-area support for notched iPhones & Android punch-holes */
    @supports (padding: env(safe-area-inset-bottom)) {
      nav          { padding-top: env(safe-area-inset-top); }
      .msg-input-area {
        padding-bottom: calc(1rem + env(safe-area-inset-bottom));
      }
      .mobile-bottom-bar {
        padding-bottom: calc(0.6rem + env(safe-area-inset-bottom));
      }
    }

    @media (max-width: 700px) {
      /* ── Body / layout ── */
      body { overflow: hidden; }

      #app {
        flex-direction: column;
        position: relative;
      }

      /* ── Nav ── */
      nav {
        padding: 0 1rem;
        height: 52px;
      }
      .nav-title { display: none; }
      .nav-user-chip {
        max-width: 90px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      /* ── Sidebar becomes a full-screen panel ── */
      .sidebar {
        position: absolute;
        inset: 0;
        width: 100%;
        z-index: 200;
        background: var(--card);
        transition: transform 0.25s ease;
        transform: translateX(0);
        display: flex;
      }

      /* When chat is open, slide sidebar out to the left */
      .sidebar.slide-out {
        transform: translateX(-100%);
        pointer-events: none;
      }

      /* ── Chat pane takes full width ── */
      .chat-pane {
        position: absolute;
        inset: 0;
        width: 100%;
        z-index: 100;
        transform: translateX(100%);
        transition: transform 0.25s ease;
        display: flex;
        flex-direction: column;
        background: var(--bg);
      }

      .chat-pane.slide-in {
        transform: translateX(0);
      }

      .back-btn { display: flex; }

      /* ── Chat header: add back button ── */
      .chat-header {
        padding: 0.75rem 1rem;
        gap: 0.6rem;
        min-height: 56px;
      }

      .back-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--primary);
        cursor: pointer;
        flex-shrink: 0;
        transition: background 0.15s;
        -webkit-tap-highlight-color: transparent;
      }
      .back-btn:active { background: var(--primary-dim); }

      /* ── Bigger tap targets in conv list ── */
      .conv-item {
        padding: 1rem 1.25rem;
        min-height: 64px;
      }
      .conv-avatar { width: 44px; height: 44px; font-size: 0.8rem; }

      /* ── Sidebar head ── */
      .sidebar-head { padding: 1rem 1.25rem; }
      .new-msg-btn { padding: 0.55rem 1rem; font-size: 0.65rem; }

      /* ── Messages area: full height minus header + input ── */
      .messages-area {
        padding: 1rem;
        flex: 1;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }

      /* ── Message bubbles slightly wider on mobile ── */
      .msg-row { max-width: 85%; }

      /* ── Input area ── */
      .msg-input-area {
        padding: 0.75rem 1rem;
        gap: 0.6rem;
      }
      .msg-input-area textarea {
        font-size: 1rem;       /* prevents iOS zoom-on-focus */
        padding: 0.65rem 0.85rem;
        border-radius: 22px;
      }
      .send-btn {
        width: 44px;
        height: 44px;
        border-radius: 22px;
      }

      /* ── Modal ── */
      .modal-box {
        padding: 1.5rem 1.25rem;
        border-radius: 18px 18px 0 0;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        max-width: 100%;
        margin: 0;
        padding-bottom: calc(1.5rem + env(safe-area-inset-bottom));
      }
      .modal-overlay.open {
        align-items: flex-end;
      }
      .modal-input { font-size: 1rem; }
      .user-results { max-height: 45vh; }
      .user-result-item { padding: 0.85rem 0.75rem; min-height: 52px; }

      /* ── Auth wall ── */
      .auth-box {
        padding: 2rem 1.5rem;
        border-radius: 18px;
      }
      .auth-field input { font-size: 1rem; padding: 0.85rem 1rem; }
      .auth-submit { padding: 1rem; font-size: 0.75rem; }

      /* ── Active chat full height ── */
      #active-chat {
        display: flex !important;
        flex: 1;
        flex-direction: column;
        overflow: hidden;
      }
    }

    /* Very small screens (iPhone SE, Galaxy A series small) */
    @media (max-width: 375px) {
      .nav-user-chip { max-width: 64px; }
      .conv-avatar { width: 38px; height: 38px; }
      .msg-bubble { font-size: 0.85rem; }
    }
  </style>
</head>
<body>

<!-- AUTH WALL -->
<div id="auth-wall">
  <div class="auth-box">
    <div class="auth-logo">
      <img src="https://assets.cdn.filesafe.space/LiVJbIgv34a0ebVd0Lef/media/69c5fbcf9619ac2fc59a966f.png" alt="KnowWhere Logo">
      <div class="auth-logo-name">KNOW<span>WHERE</span></div>
    </div>
    <div style="font-family:var(--font-display);font-size:0.65rem;letter-spacing:0.2em;color:var(--secondary);text-transform:uppercase;margin-bottom:0.5rem;">Messages</div>
    <div class="auth-field">
      <label>Email</label>
      <input type="email" id="auth-email" placeholder="your@email.com" />
    </div>
    <div class="auth-field">
      <label>Password</label>
      <input type="password" id="auth-password" placeholder="••••••••" />
    </div>
    <div class="auth-error" id="auth-error"></div>
    <button class="auth-submit" id="auth-submit" onclick="handleAuth()">Login</button>
    <a href="/" class="auth-back">← Back to main site</a>
  </div>
</div>

<!-- NAV -->
<nav>
  <a href="/" class="nav-logo">
    <img src="https://assets.cdn.filesafe.space/LiVJbIgv34a0ebVd0Lef/media/69c5fbcf9619ac2fc59a966f.png" alt="Logo">
    KNOW<span>WHERE</span>
  </a>
  <div class="nav-title">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    Messages
  </div>
  <div class="nav-right">
    <span class="nav-user-chip" id="nav-username"></span>
    <button class="nav-signout" onclick="handleSignOut()">Sign Out</button>
  </div>
</nav>

<!-- MAIN APP -->
<div id="app">
  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <span class="sidebar-head-label">Conversations</span>
      <button class="new-msg-btn" onclick="openNewConvModal()">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New
      </button>
    </div>
    <div class="sidebar-search">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="conv-search" placeholder="Search conversations..." oninput="filterConvs(this.value)" />
    </div>
    <div class="conv-list" id="conv-list">
      <div class="loading-spinner"><div class="spinner"></div> Loading...</div>
    </div>
  </div>

  <!-- CHAT PANE -->
  <div class="chat-pane" id="chat-pane">
    <div class="chat-pane-empty" id="chat-empty">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <p>Select a conversation or start a new one</p>
      <strong>← New Message</strong>
    </div>

    <div id="active-chat" style="display:none;flex:1;flex-direction:column;overflow:hidden;display:none;">
      <div class="chat-header" id="chat-header">
        <button class="back-btn" id="back-btn" onclick="closeChatMobile()" aria-label="Back to conversations">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="chat-header-avatar" id="chat-header-avatar"></div>
        <div>
          <div class="chat-header-name" id="chat-header-name"></div>
          <div class="chat-header-sub" id="chat-header-sub"></div>
        </div>
      </div>
      <div class="messages-area" id="messages-area"></div>
      <div class="msg-input-area">
        <textarea id="msg-input" placeholder="Type a message..." rows="1" onkeydown="handleMsgKey(event)" oninput="autoResizeTextarea(this)"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- NEW CONVERSATION MODAL -->
<div class="modal-overlay" id="new-conv-modal">
  <div class="modal-box">
    <div class="modal-title">New Message</div>
    <input class="modal-input" type="text" id="user-search-input" placeholder="Search by username or email..." oninput="searchUsers(this.value)" />
    <div class="modal-error" id="modal-error"></div>
    <div class="user-results" id="user-results">
      <div style="color:var(--muted);font-size:0.78rem;text-align:center;padding:1rem 0;">Start typing to find users...</div>
    </div>
    <div class="modal-actions">
      <button class="modal-cancel-btn" onclick="closeNewConvModal()">Cancel</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import {
    getAuth,
    signInWithEmailAndPassword,
    onAuthStateChanged,
    signOut
  } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
  import {
    getFirestore,
    doc, getDoc, setDoc, updateDoc,
    collection, getDocs, addDoc,
    query, where, orderBy, onSnapshot,
    serverTimestamp, Timestamp
  } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAP-GnPXo490Frl1hGYWbje8QdhxtD19PQ",
    authDomain: "knowwhere1.firebaseapp.com",
    projectId: "knowwhere1",
    storageBucket: "knowwhere1.firebasestorage.app",
    messagingSenderId: "747448090609",
    appId: "1:747448090609:web:e3af5b2c8ffa8fb3a9ce50",
    measurementId: "G-DV44FGDQ2N"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let currentUser = null;
  let currentUserData = null;
  let allConversations = [];
  let activeConvId = null;
  let messagesUnsubscribe = null;
  let convsUnsubscribe = null;
  let allUsers = [];
  const userNameCache = {};   // email → display name cache

  // ── AUTH ──
  window.handleAuth = async function() {
    const email = document.getElementById('auth-email').value.trim();
    const password = document.getElementById('auth-password').value;
    const errEl = document.getElementById('auth-error');
    const btn = document.getElementById('auth-submit');
    errEl.classList.remove('show');
    if (!email || !password) { errEl.textContent = 'Please fill in all fields.'; errEl.classList.add('show'); return; }
    btn.disabled = true; btn.textContent = 'Logging in...';
    try {
      await signInWithEmailAndPassword(auth, email, password);
    } catch(e) {
      const map = {
        'auth/invalid-credential': 'Email or password is incorrect.',
        'auth/user-not-found': 'No account found.',
        'auth/wrong-password': 'Incorrect password.',
        'auth/too-many-requests': 'Too many attempts. Try again later.'
      };
      errEl.textContent = map[e.code] || 'Login failed.';
      errEl.classList.add('show');
      btn.disabled = false; btn.textContent = 'Login';
    }
  };

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !document.getElementById('auth-wall').classList.contains('hidden')) {
      handleAuth();
    }
  });

  window.handleSignOut = async function() {
    if (convsUnsubscribe) convsUnsubscribe();
    if (messagesUnsubscribe) messagesUnsubscribe();
    await signOut(auth);
  };

  // ── AUTH STATE ──
  onAuthStateChanged(auth, async (user) => {
    const wall = document.getElementById('auth-wall');
    const appEl = document.getElementById('app');

    if (user) {
      currentUser = user;
      wall.classList.add('hidden');
      appEl.classList.add('visible');

      // Load user data
      try {
        const snap = await getDoc(doc(db, 'users', user.email));
        currentUserData = snap.exists() ? snap.data() : { email: user.email, username: user.email };
      } catch(e) {
        currentUserData = { email: user.email, username: user.email };
      }

      const displayName = currentUserData.username || user.email;
      document.getElementById('nav-username').textContent = displayName;

      // Load all users for search
      loadAllUsers();

      // Subscribe to conversations
      subscribeToConversations();

    } else {
      currentUser = null;
      currentUserData = null;
      wall.classList.remove('hidden');
      appEl.classList.remove('visible');
      document.getElementById('auth-email').value = '';
      document.getElementById('auth-password').value = '';
      document.getElementById('auth-error').classList.remove('show');
    }
  });

  // ── LOAD ALL USERS ──
  async function loadAllUsers() {
    try {
      const snap = await getDocs(collection(db, 'users'));
      allUsers = snap.docs.map(d => ({ id: d.id, ...d.data() }))
        .filter(u => u.email !== currentUser.email);
    } catch(e) {
      console.warn('Could not load users:', e);
    }
  }

  // ── CONVERSATIONS ──
  function getConvId(emailA, emailB) {
    return [emailA, emailB].sort().join('__');
  }

  function subscribeToConversations() {
    const convListEl = document.getElementById('conv-list');

    const q = query(
      collection(db, 'conversations'),
      where('participants', 'array-contains', currentUser.email)
    );

    convsUnsubscribe = onSnapshot(q, async (snapshot) => {
      // Fetch all user names in parallel before touching allConversations
      const convPromises = snapshot.docs.map(async (docSnap) => {
        const data = docSnap.data();
        const otherEmail = data.participants.find(p => p !== currentUser.email);
        let otherName = otherEmail;
        if (userNameCache[otherEmail]) {
          otherName = userNameCache[otherEmail];
        } else {
          try {
            const uSnap = await getDoc(doc(db, 'users', otherEmail));
            if (uSnap.exists() && uSnap.data().username) otherName = uSnap.data().username;
            userNameCache[otherEmail] = otherName;
          } catch {}
        }
        return { id: docSnap.id, ...data, otherEmail, otherName };
      });

      // Only update state once everything is ready — prevents flicker/duplication
      const resolved = await Promise.all(convPromises);
      resolved.sort((a, b) => {
        const ta = a.lastMessageAt?.toMillis?.() || 0;
        const tb = b.lastMessageAt?.toMillis?.() || 0;
        return tb - ta;
      });
      allConversations = resolved;
      renderConvList(allConversations);
    });
  }

  function renderConvList(convs) {
    const el = document.getElementById('conv-list');
    if (convs.length === 0) {
      el.innerHTML = `<div class="conv-empty">No conversations yet.<br>Hit <strong>New</strong> to start one.</div>`;
      return;
    }

    el.innerHTML = convs.map(c => {
      const initial = (c.otherName || c.otherEmail || '?')[0].toUpperCase();
      const preview = c.lastMessage ? escapeHtml(c.lastMessage).slice(0, 40) + (c.lastMessage.length > 40 ? '…' : '') : 'No messages yet';
      const time = c.lastMessageAt ? formatTime(c.lastMessageAt.toDate()) : '';
      const isActive = c.id === activeConvId;
      const hasUnread = c.unreadBy && c.unreadBy.includes(currentUser.email);

      return `<div class="conv-item${isActive ? ' active' : ''}" onclick="openConversation('${c.id}')">
        <div class="conv-avatar">${initial}</div>
        <div class="conv-info">
          <div class="conv-name">${escapeHtml(c.otherName || c.otherEmail)}</div>
          <div class="conv-preview">${preview}</div>
        </div>
        <div class="conv-meta">
          <div class="conv-time">${time}</div>
          ${hasUnread ? '<div class="unread-dot"></div>' : ''}
        </div>
      </div>`;
    }).join('');
  }

  window.filterConvs = function(q) {
    const filtered = q
      ? allConversations.filter(c =>
          (c.otherName || '').toLowerCase().includes(q.toLowerCase()) ||
          (c.otherEmail || '').toLowerCase().includes(q.toLowerCase()))
      : allConversations;
    renderConvList(filtered);
  };

  // ── MOBILE NAVIGATION ──
  function isMobile() { return window.innerWidth <= 700; }

  function openChatMobile() {
    if (!isMobile()) return;
    document.getElementById('sidebar').classList.add('slide-out');
    document.getElementById('chat-pane').classList.add('slide-in');
  }

  function closeChatMobile() {
    if (!isMobile()) return;
    document.getElementById('sidebar').classList.remove('slide-out');
    document.getElementById('chat-pane').classList.remove('slide-in');
  }

  window.closeChatMobile = closeChatMobile;

  // Handle resize: reset mobile state if user goes to desktop
  window.addEventListener('resize', () => {
    if (!isMobile()) {
      document.getElementById('sidebar').classList.remove('slide-out');
      document.getElementById('chat-pane').classList.remove('slide-in');
    }
  });

  // ── OPEN CONVERSATION ──
  window.openConversation = async function(convId) {
    if (messagesUnsubscribe) messagesUnsubscribe();
    activeConvId = convId;

    const conv = allConversations.find(c => c.id === convId);
    if (!conv) return;

    // Mark read
    if (conv.unreadBy && conv.unreadBy.includes(currentUser.email)) {
      updateDoc(doc(db, 'conversations', convId), {
        unreadBy: conv.unreadBy.filter(e => e !== currentUser.email)
      }).catch(() => {});
    }

    // Update active state in sidebar
    document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
    const convEl = document.querySelector(`.conv-item[onclick="openConversation('${convId}')"]`);
    if (convEl) convEl.classList.add('active');

    // Populate header
    const initial = (conv.otherName || conv.otherEmail || '?')[0].toUpperCase();
    document.getElementById('chat-header-avatar').textContent = initial;
    document.getElementById('chat-header-name').textContent = conv.otherName || conv.otherEmail;
    document.getElementById('chat-header-sub').textContent = conv.otherEmail;

    // Show chat pane
    document.getElementById('chat-empty').style.display = 'none';
    const activeChat = document.getElementById('active-chat');
    activeChat.style.display = 'flex';
    activeChat.style.flexDirection = 'column';
    activeChat.style.flex = '1';
    activeChat.style.overflow = 'hidden';

    // On mobile, slide to chat view
    openChatMobile();

    // Subscribe to messages
    const msgsRef = collection(db, 'conversations', convId, 'messages');
    const msgsQuery = query(msgsRef, orderBy('sentAt', 'asc'));

    document.getElementById('messages-area').innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>';

    messagesUnsubscribe = onSnapshot(msgsQuery, (snap) => {
      renderMessages(snap.docs.map(d => ({ id: d.id, ...d.data() })));
    });
  };

  function renderMessages(msgs) {
    const area = document.getElementById('messages-area');
    const wasAtBottom = area.scrollHeight - area.scrollTop - area.clientHeight < 60;

    if (msgs.length === 0) {
      area.innerHTML = `<div style="text-align:center;color:var(--muted);font-size:0.8rem;padding:2rem 0;opacity:0.6;">No messages yet. Say hi!</div>`;
      return;
    }

    let html = '';
    let lastDate = null;

    for (const msg of msgs) {
      const date = msg.sentAt?.toDate ? msg.sentAt.toDate() : new Date(msg.sentAt || Date.now());
      const dateStr = date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });

      if (dateStr !== lastDate) {
        html += `<div class="msg-date-divider">${dateStr}</div>`;
        lastDate = dateStr;
      }

      const isMine = msg.senderEmail === currentUser.email;
      const initial = (msg.senderName || msg.senderEmail || '?')[0].toUpperCase();
      const timeStr = date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

      html += `<div class="msg-row ${isMine ? 'mine' : 'theirs'}">
        ${!isMine ? `<div class="msg-avatar-sm">${initial}</div>` : ''}
        <div>
          <div class="msg-bubble">${escapeHtml(msg.text)}<span class="msg-time">${timeStr}</span></div>
        </div>
        ${isMine ? `<div class="msg-avatar-sm">${initial}</div>` : ''}
      </div>`;
    }

    area.innerHTML = html;
    if (wasAtBottom || msgs.length <= 1) {
      area.scrollTop = area.scrollHeight;
    }
  }

  // ── SEND MESSAGE ──
  window.sendMessage = async function() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text || !activeConvId) return;

    const btn = document.getElementById('send-btn');
    btn.disabled = true;

    const senderName = currentUserData?.username || currentUser.email;

    try {
      const msgRef = collection(db, 'conversations', activeConvId, 'messages');
      await addDoc(msgRef, {
        text,
        senderEmail: currentUser.email,
        senderName,
        sentAt: serverTimestamp()
      });

      const conv = allConversations.find(c => c.id === activeConvId);
      const otherEmail = conv?.otherEmail;

      await updateDoc(doc(db, 'conversations', activeConvId), {
        lastMessage: text,
        lastMessageAt: serverTimestamp(),
        unreadBy: otherEmail ? [otherEmail] : []
      });

      input.value = '';
      input.style.height = 'auto';
    } catch(e) {
      console.error('Send error:', e);
      alert('Failed to send message.');
    }
    btn.disabled = false;
  };

  window.handleMsgKey = function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  };

  window.autoResizeTextarea = function(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  };

  // ── NEW CONVERSATION MODAL ──
  let searchTimeout = null;

  window.openNewConvModal = function() {
    document.getElementById('new-conv-modal').classList.add('open');
    document.getElementById('user-search-input').value = '';
    document.getElementById('modal-error').classList.remove('show');
    _renderUserList(allUsers);
    setTimeout(() => document.getElementById('user-search-input').focus(), 50);
  };

  window.closeNewConvModal = function() {
    document.getElementById('new-conv-modal').classList.remove('open');
  };

  document.getElementById('new-conv-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('new-conv-modal')) closeNewConvModal();
  });

  window.searchUsers = function(q) {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => _searchUsers(q), 200);
  };

  function _renderUserList(users) {
    const resultsEl = document.getElementById('user-results');
    if (users.length === 0) {
      resultsEl.innerHTML = `<div style="color:var(--muted);font-size:0.78rem;text-align:center;padding:1rem 0;">No users found.</div>`;
      return;
    }
    resultsEl.innerHTML = users.map(u => {
      const name = u.username || u.email;
      const initial = name[0].toUpperCase();
      return `<div class="user-result-item" onclick="startConversation('${u.email}')">
        <div class="user-result-avatar">${initial}</div>
        <div>
          <div class="user-result-name">${escapeHtml(name)}</div>
          <div class="user-result-email">${escapeHtml(u.email)}</div>
        </div>
      </div>`;
    }).join('');
  }

  function _searchUsers(q) {
    if (!q.trim()) {
      _renderUserList(allUsers);
      return;
    }

    const lower = q.toLowerCase();
    const matches = allUsers.filter(u =>
      (u.username || '').toLowerCase().includes(lower) ||
      (u.email || '').toLowerCase().includes(lower)
    );

    _renderUserList(matches);
  }

  window.startConversation = async function(otherEmail) {
    const errEl = document.getElementById('modal-error');
    errEl.classList.remove('show');

    if (otherEmail === currentUser.email) {
      errEl.textContent = "You can't message yourself.";
      errEl.classList.add('show');
      return;
    }

    const convId = getConvId(currentUser.email, otherEmail);

    // Check if conversation already exists
    const convRef = doc(db, 'conversations', convId);
    const convSnap = await getDoc(convRef);

    if (!convSnap.exists()) {
      await setDoc(convRef, {
        participants: [currentUser.email, otherEmail],
        createdAt: serverTimestamp(),
        lastMessageAt: serverTimestamp(),
        lastMessage: '',
        unreadBy: []
      });
    }

    closeNewConvModal();
    // Wait a tick for subscription to catch up
    setTimeout(() => openConversation(convId), 300);
  };

  // ── UTILS ──
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatTime(date) {
    const now = new Date();
    const diff = now - date;
    if (diff < 60000) return 'just now';
    if (diff < 3600000) return Math.floor(diff / 60000) + 'm';
    if (diff < 86400000) return date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    if (diff < 604800000) return date.toLocaleDateString('en-US', { weekday: 'short' });
    return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }
</script>
