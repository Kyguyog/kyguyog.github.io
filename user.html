<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>User Management — KnowWhere</title>
<link href="favicon.png" rel="icon" type="image/x-icon"/>
<script src="tab-config.js" defer></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&amp;family=Orbitron:wght@400;700;900&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --card: #111118;
      --border: #222230;
      --primary: #a855f7;
      --primary-dim: rgba(168,85,247,0.15);
      --secondary: #22d3ee;
      --secondary-dim: rgba(34,211,238,0.15);
      --danger: #ef4444;
      --danger-dim: rgba(239,68,68,0.12);
      --text: #e2e8f0;
      --muted: #64748b;
      --font-display: 'Orbitron', sans-serif;
      --font-body: 'Inter', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: #000;
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── AUTH WALL ── */
    #auth-wall {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    #auth-wall.hidden { display: none; }
    #main-content { display: none; }
    #main-content.visible { display: contents; }

    .auth-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 0 60px rgba(168,85,247,0.12);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .auth-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.75rem;
    }
    .auth-logo img { width: 56px; height: 56px; object-fit: contain; filter: drop-shadow(0 0 12px rgba(168,85,247,0.8)); }
    .auth-logo-name {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 900;
      letter-spacing: 0.05em;
    }
    .auth-logo-name span { color: var(--primary); }
    .auth-tabs {
      display: flex;
      width: 100%;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
      margin-bottom: 1.75rem;
    }
    .auth-tab {
      flex: 1;
      padding: 0.65rem;
      background: transparent;
      border: none;
      color: var(--muted);
      font-family: var(--font-display);
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .auth-tab.active { background: var(--primary-dim); color: var(--primary); border-bottom: 2px solid var(--primary); }
    .auth-form { width: 100%; display: flex; flex-direction: column; gap: 1rem; }
    .auth-field { display: flex; flex-direction: column; gap: 0.4rem; }
    .auth-field label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .auth-field input {
      width: 100%;
      background: #0d0d14;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-size: 0.95rem;
      font-family: var(--font-body);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .auth-field input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(168,85,247,0.15); }
    .auth-submit {
      width: 100%;
      margin-top: 0.5rem;
      padding: 0.85rem;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-family: var(--font-display);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(168,85,247,0.35);
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    }
    .auth-submit:hover { transform: scale(1.02); box-shadow: 0 0 32px rgba(168,85,247,0.6); }
    .auth-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .auth-error {
      width: 100%;
      background: var(--danger-dim);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 6px;
      padding: 0.65rem 1rem;
      color: var(--danger);
      font-size: 0.85rem;
      display: none;
      margin-top: 0.25rem;
    }
    .auth-error.show { display: block; }
    .auth-user-name {
      font-family: var(--font-display);
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--primary);
      cursor: pointer;
      padding: 0.35rem 0.75rem;
      border: 1px solid rgba(168,85,247,0.35);
      border-radius: 6px;
      background: var(--primary-dim);
      transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .auth-user-name:hover { background: rgba(168,85,247,0.25); border-color: var(--primary); box-shadow: 0 0 12px rgba(168,85,247,0.3); }
    .auth-user-name svg { opacity: 0.7; }

    /* ── USER POPUP ── */
    #user-popup {
      display: none;
      position: fixed;
      top: 64px;
      right: 1.5rem;
      z-index: 9998;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      width: 280px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 24px rgba(168,85,247,0.1);
      overflow: hidden;
      animation: popIn 0.15s ease;
    }
    #user-popup.open { display: block; }
    @keyframes popIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
    .popup-header {
      padding: 1rem 1.25rem 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    .popup-header-label { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.2rem; }
    .popup-header-name { font-family: var(--font-display); font-size: 0.9rem; font-weight: 700; color: var(--primary); }
    .popup-header-email { font-size: 0.75rem; color: var(--muted); margin-top: 0.1rem; }
    .popup-section { padding: 0.5rem; }
    .popup-section + .popup-section { border-top: 1px solid var(--border); }
    .popup-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.65rem 0.75rem;
      background: transparent;
      border: none;
      border-radius: 6px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s, color 0.15s;
    }
    .popup-btn:hover { background: rgba(255,255,255,0.05); }
    .popup-btn.danger { color: var(--danger); }
    .popup-btn.danger:hover { background: var(--danger-dim); }
    .popup-btn svg { flex-shrink: 0; opacity: 0.7; }
    .popup-inline-form { display: none; flex-direction: column; gap: 0.5rem; padding: 0.25rem 0.75rem 0.75rem; }
    .popup-inline-form.open { display: flex; }
    .popup-inline-form input {
      width: 100%;
      background: #0d0d14;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.6rem 0.75rem;
      color: var(--text);
      font-size: 0.85rem;
      font-family: var(--font-body);
      outline: none;
      transition: border-color 0.2s;
    }
    .popup-inline-form input:focus { border-color: var(--primary); }
    .popup-inline-form input::placeholder { color: var(--muted); }
    .popup-inline-form-row { display: flex; gap: 0.4rem; }
    .popup-save-btn { flex: 1; padding: 0.5rem; background: var(--primary); color: #fff; border: none; border-radius: 6px; font-family: var(--font-display); font-size: 0.6rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: opacity 0.2s; }
    .popup-save-btn:hover { opacity: 0.85; }
    .popup-cancel-btn { flex: 1; padding: 0.5rem; background: transparent; color: var(--muted); border: 1px solid var(--border); border-radius: 6px; font-family: var(--font-display); font-size: 0.6rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; }
    .popup-msg { font-size: 0.75rem; padding: 0.3rem 0.1rem; display: none; }
    .popup-msg.ok { display: block; color: #22c55e; }
    .popup-msg.err { display: block; color: var(--danger); }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: rgba(10,10,15,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 56px;
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 0.5rem; /* keeps spacing between image and text */
      text-decoration: none;
    }

    .logo-text {
      display: inline-block; /* ensures KNOW + WHERE act as one unit */
      font-family: var(--font-display);
      font-weight: 900;
      letter-spacing: 0.05em;
      text-decoration: none;
    }
    .nav-logo img { width: 28px; height: 28px; object-fit: contain; }
    .logo-text { color: var(--text); text-decoration: none; }
    .logo-text > span { margin-left: -0.05em; color: var(--primary); text-decoration: none; }
    .nav-logo svg { color: var(--primary); }
    .nav-logo svg { color: var(--primary); }
    .nav-links { display: flex; gap: 2.5rem; position: absolute; left: 50%; transform: translateX(-50%); }
    .nav-links a {
      font-family: var(--font-display);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text); }

    
  <style>
/* ── ADMIN PANEL ── */
    #admin-panel {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 10000;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(6px);
      padding: 1.5rem;
      overflow-y: auto;
    }
    #admin-panel.open { display: flex; align-items: flex-start; justify-content: center; }
    .admin-modal {
      background: #0d0d14;
      border: 1px solid rgba(168,85,247,0.4);
      border-radius: 16px;
      width: 100%;
      max-width: min(1400px, 92vw);
      box-shadow: 0 0 80px rgba(168,85,247,0.15);
      overflow: hidden;
      margin: auto;
    }
    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 1.75rem;
      border-bottom: 1px solid var(--border);
      background: rgba(168,85,247,0.05);
    }
    .admin-header-title {
      font-family: var(--font-display);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .admin-close {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      padding: 0.4rem 0.75rem;
      font-size: 0.75rem;
      font-family: var(--font-display);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: border-color 0.2s, color 0.2s;
    }
    .admin-close:hover { border-color: var(--danger); color: var(--danger); }
    .admin-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      background: #0a0a0f;
      scrollbar-width: none;
    }
    .admin-tabs::-webkit-scrollbar { display: none; }
    .admin-tab {
      flex-shrink: 0;
      padding: 0.75rem 1.25rem;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      font-family: var(--font-display);
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      white-space: nowrap;
    }
    .admin-tab.active { color: var(--primary); border-bottom-color: var(--primary); }
    .admin-tab:hover:not(.active) { color: var(--text); }
    .admin-body { padding: 1.75rem; }
    .admin-section { display: none; }
    .admin-section.active { display: block; }
    .admin-field { margin-bottom: 1.1rem; }
    .admin-field label {
      display: block;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }
    .admin-input {
      width: 100%;
      background: #111118;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.65rem 0.9rem;
      color: var(--text);
      font-size: 0.88rem;
      font-family: var(--font-body);
      outline: none;
      transition: border-color 0.2s;
    }
    .admin-input:focus { border-color: var(--primary); }
    .admin-textarea {
      width: 100%;
      background: #111118;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.7rem 0.9rem;
      color: var(--text);
      font-size: 0.82rem;
      font-family: monospace;
      outline: none;
      resize: vertical;
      min-height: 200px;
      line-height: 1.65;
      transition: border-color 0.2s;
    }
    .admin-textarea:focus { border-color: var(--primary); }
    .admin-hint {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 0.35rem;
      line-height: 1.5;
    }
    .admin-hint code {
      background: #1a1a26;
      border-radius: 3px;
      padding: 0.1rem 0.3rem;
      font-size: 0.7rem;
      color: var(--secondary);
    }
    .admin-save-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-top: 1.5rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
    }
    .admin-save-btn {
      padding: 0.7rem 1.75rem;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-family: var(--font-display);
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(168,85,247,0.3);
      transition: opacity 0.2s, transform 0.15s;
    }
    .admin-save-btn:hover { opacity: 0.85; transform: scale(1.02); }
    .admin-save-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .admin-status { font-size: 0.8rem; font-weight: 600; }
    .admin-status.ok { color: #22c55e; }
    .admin-status.err { color: var(--danger); }
    .admin-row-list { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 0.5rem; }
    .admin-row-item { display: flex; gap: 0.5rem; align-items: flex-start; }
    .admin-card-item {
      background: #111118;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 0.5rem;
    }
    .admin-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.25rem;
    }
    .admin-card-label {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .admin-row-input {
      flex: 1;
      background: #111118;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.52rem 0.75rem;
      color: var(--text);
      font-size: 0.85rem;
      font-family: var(--font-body);
      outline: none;
      transition: border-color 0.2s;
      min-width: 0;
    }
    .admin-row-input:focus { border-color: var(--primary); }
    .admin-row-input::placeholder { color: var(--muted); }

    /* ── Toggle Switch ── */
    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      height: 32px; /* match input height */
    }
    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 38px;
      height: 22px;
      flex-shrink: 0;
    }
    .toggle-switch input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-track {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .toggle-track::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--muted);
      transition: transform 0.2s, background 0.2s;
    }
    .toggle-switch input:checked + .toggle-track { background: rgba(34,197,94,0.25); border-color: rgba(34,197,94,0.5); }
    .toggle-switch input:checked + .toggle-track::after { transform: translateX(16px); background: #22c55e; }
    .toggle-switch.admin-toggle input:checked + .toggle-track { background: var(--primary-dim); border-color: rgba(168,85,247,0.5); }
    .toggle-switch.admin-toggle input:checked + .toggle-track::after { background: var(--primary); }
    .toggle-switch.editor-toggle input:checked + .toggle-track { background: rgba(34,211,238,0.2); border-color: rgba(34,211,238,0.5); }
    .toggle-switch.editor-toggle input:checked + .toggle-track::after { background: var(--secondary); }
    .toggle-switch.orders-toggle input:checked + .toggle-track { background: rgba(34,197,94,0.2); border-color: rgba(34,197,94,0.5); }
    .toggle-switch.orders-toggle input:checked + .toggle-track::after { background: #22c55e; }
    .toggle-label {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      transition: color 0.2s;
      min-width: 48px;
    }
    .toggle-switch input:checked ~ .toggle-label { color: var(--text); }
    .admin-card-input {
      width: 100%;
      background: #0d0d14;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.5rem 0.75rem;
      color: var(--text);
      font-size: 0.85rem;
      font-family: var(--font-body);
      outline: none;
      transition: border-color 0.2s;
    }
    .admin-card-input:focus { border-color: var(--primary); }
    .admin-card-input::placeholder { color: var(--muted); }
    .admin-row-remove {
      flex-shrink: 0;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      padding: 0.45rem 0.6rem;
      font-size: 0.8rem;
      line-height: 1;
      transition: border-color 0.2s, color 0.2s;
    }
    .admin-row-remove:hover { border-color: var(--danger); color: var(--danger); }
    .admin-add-btn {
      width: 100%;
      background: transparent;
      border: 1px dashed rgba(168,85,247,0.4);
      border-radius: 6px;
      color: var(--primary);
      cursor: pointer;
      padding: 0.55rem 1rem;
      font-size: 0.7rem;
      font-family: var(--font-display);
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: border-color 0.2s, background 0.2s;
      margin-top: 0.25rem;
    }
    .admin-add-btn:hover { border-color: var(--primary); background: var(--primary-dim); }
    .admin-sublabel {
      font-family: var(--font-display);
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--secondary);
      margin: 1.25rem 0 0.6rem;
    }
    .admin-divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }

        
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,10,15,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 2rem; height: 56px;
    }
    #main-content.visible { display: block; }
  </style>
</head>
<body>

<div id="auth-wall">
<div class="auth-box">
<div class="auth-logo">
<img alt="KnowWhere" src="KnowWhere-Logo-Trans.png"/>
<div class="auth-logo-name">KNOW<span>WHERE</span></div>
</div>
<form autocomplete="on" class="auth-form" id="login-form-wrap" onsubmit="handleAuth();return false;">
<div class="auth-field">
<label>Email</label>
<input autocomplete="email" id="auth-email" placeholder="you@example.com" type="email"/>
</div>
<div class="auth-field">
<label>Password</label>
<input autocomplete="current-password" id="auth-password" placeholder="••••••••" type="password"/>
</div>
<div class="auth-error" id="auth-error"></div>
<button class="auth-submit" id="auth-submit" type="submit">Login</button>
</form>
</div>
</div>

<div id="main-content">
