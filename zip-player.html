<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Zip Game Loader</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: #0a0a12;
      color: #e8e8f0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1.25rem;
      box-sizing: border-box;
    }
    .panel {
      width: min(760px, 100%);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 12px;
      background: rgba(18, 18, 28, 0.92);
      padding: 1rem;
      box-sizing: border-box;
    }
    .title { margin: 0 0 0.4rem; font-size: 1rem; }
    .status { margin: 0.2rem 0 0; color: #b7b7cf; font-size: 0.92rem; }
    .err { color: #ff8e8e; }
    .ok { color: #78f0a6; }
  </style>
</head>
<body>
  <div class="panel">
    <h1 class="title">Loading game package…</h1>
    <p id="status" class="status">Preparing zip runtime.</p>
  </div>

  <script type="module">
    import { unzipSync, strFromU8 } from 'https://cdn.jsdelivr.net/npm/fflate@0.8.2/esm/browser.js';

    const statusEl = document.getElementById('status');
    const params = new URLSearchParams(location.search);
    const zipUrl = params.get('zip') || '';
    const entryRaw = params.get('entry') || 'index.html';
    const entry = normalizePath(entryRaw);

    function setStatus(msg, cls = '') {
      statusEl.textContent = msg;
      statusEl.className = `status ${cls}`.trim();
    }

    function normalizePath(path) {
      return (path || '')
        .replace(/^\/+/, '')
        .replace(/\\/g, '/')
        .split('/')
        .filter(Boolean)
        .join('/');
    }

    function contentType(path) {
      const lower = path.toLowerCase();
      if (lower.endsWith('.html') || lower.endsWith('.htm')) return 'text/html; charset=utf-8';
      if (lower.endsWith('.js')) return 'text/javascript; charset=utf-8';
      if (lower.endsWith('.mjs')) return 'text/javascript; charset=utf-8';
      if (lower.endsWith('.css')) return 'text/css; charset=utf-8';
      if (lower.endsWith('.json')) return 'application/json; charset=utf-8';
      if (lower.endsWith('.svg')) return 'image/svg+xml';
      if (lower.endsWith('.png')) return 'image/png';
      if (lower.endsWith('.jpg') || lower.endsWith('.jpeg')) return 'image/jpeg';
      if (lower.endsWith('.webp')) return 'image/webp';
      if (lower.endsWith('.gif')) return 'image/gif';
      if (lower.endsWith('.ico')) return 'image/x-icon';
      if (lower.endsWith('.mp3')) return 'audio/mpeg';
      if (lower.endsWith('.ogg')) return 'audio/ogg';
      if (lower.endsWith('.wav')) return 'audio/wav';
      if (lower.endsWith('.mp4')) return 'video/mp4';
      if (lower.endsWith('.webm')) return 'video/webm';
      if (lower.endsWith('.wasm')) return 'application/wasm';
      if (lower.endsWith('.xml')) return 'application/xml; charset=utf-8';
      if (lower.endsWith('.txt')) return 'text/plain; charset=utf-8';
      return 'application/octet-stream';
    }

    async function ensureSw() {
      if (!('serviceWorker' in navigator)) {
        throw new Error('This browser does not support service workers.');
      }
      const reg = await navigator.serviceWorker.register('/zip-sw.js', { scope: '/' });
      await navigator.serviceWorker.ready;
      if (reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
    }

    async function loadZipToCache(zipArrayBuffer, runtimeId) {
      const cache = await caches.open('zip-runtime');
      const files = unzipSync(new Uint8Array(zipArrayBuffer));
      const root = `${location.origin}/__zip_runtime/${runtimeId}/`;

      let fileCount = 0;
      for (const [name, bytes] of Object.entries(files)) {
        const clean = normalizePath(name);
        if (!clean) continue;

        const headers = { 'Content-Type': contentType(clean) };
        let body;

        if (headers['Content-Type'].startsWith('text/') || headers['Content-Type'].includes('javascript') || headers['Content-Type'].includes('json') || headers['Content-Type'].includes('xml')) {
          body = strFromU8(bytes);
        } else {
          body = bytes;
        }

        await cache.put(new Request(root + clean), new Response(body, { status: 200, headers }));
        fileCount += 1;
      }

      return fileCount;
    }

    (async () => {
      try {
        if (!zipUrl) throw new Error('Missing zip URL.');

        setStatus('Starting zip runtime…');
        await ensureSw();

        setStatus('Downloading zip from GitHub Releases…');
        const res = await fetch(zipUrl, { mode: 'cors', credentials: 'omit' });
        if (!res.ok) throw new Error(`Zip download failed (${res.status}).`);

        const ab = await res.arrayBuffer();
        const runtimeId = `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;

        setStatus('Extracting and caching game files…');
        const total = await loadZipToCache(ab, runtimeId);
        if (!total) throw new Error('Zip had no readable files.');

        const target = `/__zip_runtime/${runtimeId}/${entry || 'index.html'}`;
        setStatus('Launching game…', 'ok');
        location.replace(target);
      } catch (err) {
        setStatus(err && err.message ? err.message : 'Failed to load zip game.', 'err');
      }
    })();
  </script>
</body>
</html>
