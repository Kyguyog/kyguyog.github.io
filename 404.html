<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404</title>
  <link rel="icon" href="favicon.png" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --primary: #a855f7;
      --secondary: #22d3ee;
      --danger: #ef4444;
      --text: #e2e8f0;
      --muted: #64748b;
      --border: #222230;
      --font-display: 'Orbitron', sans-serif;
      --font-body: 'Inter', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      background: rgba(10,10,15,0.85);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      z-index: 100;
    }

    .nav-logo {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 1.1rem;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      color: var(--text);
    }
    .nav-logo span { color: var(--primary); }

    .page-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      padding-top: 56px;
      position: relative;
      overflow: hidden;
    }

    .page-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 40%, rgba(168,85,247,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(34,211,238,0.06) 0%, transparent 60%),
        repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(168,85,247,0.04) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(168,85,247,0.04) 40px);
    }
    .page-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 60%, var(--bg) 100%);
    }

    .content {
      position: relative;
      z-index: 2;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .error-num {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: clamp(7rem, 22vw, 14rem);
      letter-spacing: -0.03em;
      line-height: 1;
      color: var(--primary);
      text-shadow: 0 0 40px rgba(168,85,247,0.9), 0 0 80px rgba(168,85,247,0.4);
      position: relative;
      animation: glitch 3s infinite;
      margin-bottom: 0.25rem;
    }
    @keyframes glitch {
      0%, 90%, 100% { text-shadow: 0 0 40px rgba(168,85,247,0.9), 0 0 80px rgba(168,85,247,0.4); transform: none; }
      91%  { text-shadow: -3px 0 var(--secondary), 3px 0 var(--danger), 0 0 40px rgba(168,85,247,0.9); transform: skewX(-1deg); }
      92%  { text-shadow: 3px 0 var(--secondary), -3px 0 var(--danger), 0 0 40px rgba(168,85,247,0.9); transform: skewX(1deg); }
      93%, 96%  { text-shadow: 0 0 40px rgba(168,85,247,0.9); transform: none; }
      95%  { text-shadow: -2px 0 var(--secondary), 2px 0 var(--danger), 0 0 40px rgba(168,85,247,0.9); transform: skewX(-0.5deg); }
    }

    .error-subtitle {
      font-family: var(--font-display);
      font-size: clamp(0.75rem, 2vw, 1.1rem);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--secondary);
      text-shadow: 0 0 20px rgba(34,211,238,0.6);
      margin-bottom: 1.5rem;
    }

    .error-desc {
      color: var(--muted);
      font-size: 0.95rem;
      max-width: 380px;
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }

    .home-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.9rem 2rem;
      background: var(--primary);
      color: #fff;
      font-family: var(--font-display);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 2px;
      box-shadow: 0 0 20px rgba(168,85,247,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .home-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 32px rgba(168,85,247,0.7);
    }

    .scanlines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px);
    }
  </style>
</head>
<body>

  <div class="scanlines"></div>

  <div class="page-wrap">
    <div class="page-bg"></div>

    <div class="content">
      <div class="error-num">404</div>
      <p class="error-subtitle">Page Not Found</p>
      <p class="error-desc">
        Looks like this page doesn't exist<br>
        Head back to KnowWhere and find your game.
      </p>
      <a href="index.html" class="home-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Back to Home
      </a>
    </div>
  </div>

</body>
</html>
