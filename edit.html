<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Edit Site Content — KnowWhere</title>
  <link rel="icon" href="https://assets.cdn.filesafe.space/LiVJbIgv34a0ebVd0Lef/media/69c5fbcf5ebd49158a7811ff.png" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --card: #111118;
      --border: #222230;
      --primary: #a855f7;
      --primary-dim: rgba(168,85,247,0.15);
      --secondary: #22d3ee;
      --secondary-dim: rgba(34,211,238,0.15);
      --danger: #ef4444;
      --danger-dim: rgba(239,68,68,0.12);
      --text: #e2e8f0;
      --muted: #64748b;
      --font-display: 'Orbitron', sans-serif;
      --font-body: 'Inter', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: #000;
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── AUTH WALL ── */
    #auth-wall {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    #auth-wall.hidden { display: none; }
    #main-content { display: none; }
    #main-content.visible { display: contents; }

    .auth-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 0 60px rgba(168,85,247,0.12);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .auth-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.75rem;
    }
    .auth-logo img { width: 56px; height: 56px; object-fit: contain; filter: drop-shadow(0 0 12px rgba(168,85,247,0.8)); }
    .auth-logo-name {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 900;
      letter-spacing: 0.05em;
    }
    .auth-logo-name span { color: var(--primary); }
    .auth-tabs {
      display: flex;
      width: 100%;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
      margin-bottom: 1.75rem;
    }
    .auth-tab {
      flex: 1;
      padding: 0.65rem;
      background: transparent;
      border: none;
      color: var(--muted);
      font-family: var(--font-display);
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .auth-tab.active { background: var(--primary-dim); color: var(--primary); border-bottom: 2px solid var(--primary); }
    .auth-form { width: 100%; display: flex; flex-direction: column; gap: 1rem; }
    .auth-field { display: flex; flex-direction: column; gap: 0.4rem; }
    .auth-field label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .auth-field input {
      width: 100%;
      background: #0d0d14;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-size: 0.95rem;
      font-family: var(--font-body);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .auth-field input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(168,85,247,0.15); }
    .auth-submit {
      width: 100%;
      margin-top: 0.5rem;
      padding: 0.85rem;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-family: var(--font-display);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(168,85,247,0.35);
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    }
    .auth-submit:hover { transform: scale(1.02); box-shadow: 0 0 32px rgba(168,85,247,0.6); }
    .auth-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .auth-error {
      width: 100%;
      background: var(--danger-dim);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 6px;
      padding: 0.65rem 1rem;
      color: var(--danger);
      font-size: 0.85rem;
      display: none;
      margin-top: 0.25rem;
    }
    .auth-error.show { display: block; }
    .auth-user-name {
      font-family: var(--font-display);
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--primary);
      cursor: pointer;
      padding: 0.35rem 0.75rem;
      border: 1px solid rgba(168,85,247,0.35);
      border-radius: 6px;
      background: var(--primary-dim);
      transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .auth-user-name:hover { background: rgba(168,85,247,0.25); border-color: var(--primary); box-shadow: 0 0 12px rgba(168,85,247,0.3); }
    .auth-user-name svg { opacity: 0.7; }

    /* ── USER POPUP ── */
    #user-popup {
      display: none;
      position: fixed;
      top: 64px;
      right: 1.5rem;
      z-index: 9998;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      width: 280px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 24px rgba(168,85,247,0.1);
      overflow: hidden;
      animation: popIn 0.15s ease;
    }
    #user-popup.open { display: block; }
    @keyframes popIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
    .popup-header {
      padding: 1rem 1.25rem 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    .popup-header-label { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.2rem; }
    .popup-header-name { font-family: var(--font-display); font-size: 0.9rem; font-weight: 700; color: var(--primary); }
    .popup-header-email { font-size: 0.75rem; color: var(--muted); margin-top: 0.1rem; }
    .popup-section { padding: 0.5rem; }
    .popup-section + .popup-section { border-top: 1px solid var(--border); }
    .popup-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.65rem 0.75rem;
      background: transparent;
      border: none;
      border-radius: 6px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s, color 0.15s;
    }
    .popup-btn:hover { background: rgba(255,255,255,0.05); }
    .popup-btn.danger { color: var(--danger); }
    .popup-btn.danger:hover { background: var(--danger-dim); }
    .popup-btn svg { flex-shrink: 0; opacity: 0.7; }
    .popup-inline-form { display: none; flex-direction: column; gap: 0.5rem; padding: 0.25rem 0.75rem 0.75rem; }
    .popup-inline-form.open { display: flex; }
    .popup-inline-form input {
      width: 100%;
      background: #0d0d14;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.6rem 0.75rem;
      color: var(--text);
      font-size: 0.85rem;
      font-family: var(--font-body);
      outline: none;
      transition: border-color 0.2s;
    }
    .popup-inline-form input:focus { border-color: var(--primary); }
    .popup-inline-form input::placeholder { color: var(--muted); }
    .popup-inline-form-row { display: flex; gap: 0.4rem; }
    .popup-save-btn { flex: 1; padding: 0.5rem; background: var(--primary); color: #fff; border: none; border-radius: 6px; font-family: var(--font-display); font-size: 0.6rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: opacity 0.2s; }
    .popup-save-btn:hover { opacity: 0.85; }
    .popup-cancel-btn { flex: 1; padding: 0.5rem; background: transparent; color: var(--muted); border: 1px solid var(--border); border-radius: 6px; font-family: var(--font-display); font-size: 0.6rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; }
    .popup-msg { font-size: 0.75rem; padding: 0.3rem 0.1rem; display: none; }
    .popup-msg.ok { display: block; color: #22c55e; }
    .popup-msg.err { display: block; color: var(--danger); }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: rgba(10,10,15,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 56px;
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 0.5rem; /* keeps spacing between image and text */
      text-decoration: none;
    }

    .logo-text {
      display: inline-block; /* ensures KNOW + WHERE act as one unit */
      font-family: var(--font-display);
      font-weight: 900;
      letter-spacing: 0.05em;
      text-decoration: none;
    }
    .nav-logo img { width: 28px; height: 28px; object-fit: contain; }
    .logo-text { color: var(--text); text-decoration: none; }
    .logo-text > span { margin-left: -0.05em; color: var(--primary); text-decoration: none; }
    .nav-logo svg { color: var(--primary); }
    .nav-logo svg { color: var(--primary); }
    .nav-links { display: flex; gap: 2.5rem; position: absolute; left: 50%; transform: translateX(-50%); }
    .nav-links a {
      font-family: var(--font-display);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text); }

    
  <style>
/* ── ADMIN PANEL ── */
    #admin-panel {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 10000;
      background: #000;
      overflow-y: auto;
    }
    #admin-panel.open { display: flex; align-items: flex-start; justify-content: center; }
    .admin-modal {
      background: #000;
      border: none;
      border-radius: 0;
      width: 100%;
      max-width: 100%;
      min-height: 100vh;
      overflow: hidden;
      margin: 0;
    }
    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 1.75rem;
      border-bottom: 1px solid var(--border);
      background: rgba(168,85,247,0.05);
    }
    .admin-header-title {
      font-family: var(--font-display);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .admin-close {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      padding: 0.4rem 0.75rem;
      font-size: 0.75rem;
      font-family: var(--font-display);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: border-color 0.2s, color 0.2s;
    }
    .admin-close:hover { border-color: var(--danger); color: var(--danger); }
    .admin-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      background: #0a0a0f;
      scrollbar-width: none;
    }
    .admin-tabs::-webkit-scrollbar { display: none; }
    .admin-tab {
      flex-shrink: 0;
      padding: 0.75rem 1.25rem;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      font-family: var(--font-display);
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      white-space: nowrap;
    }
    .admin-tab.active { color: var(--primary); border-bottom-color: var(--primary); }
    .admin-tab:hover:not(.active) { color: var(--text); }
    .admin-body { padding: 1.75rem; }
    .admin-section { display: none; }
    .admin-section.active { display: block; }
    .admin-field { margin-bottom: 1.1rem; }
    .admin-field label {
      display: block;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }
    .admin-input {
      width: 100%;
      background: #111118;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.65rem 0.9rem;
      color: var(--text);
      font-size: 0.88rem;
      font-family: var(--font-body);
      outline: none;
      transition: border-color 0.2s;
    }
    .admin-input:focus { border-color: var(--primary); }
    .admin-textarea {
      width: 100%;
      background: #111118;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.7rem 0.9rem;
      color: var(--text);
      font-size: 0.82rem;
      font-family: monospace;
      outline: none;
      resize: vertical;
      min-height: 200px;
      line-height: 1.65;
      transition: border-color 0.2s;
    }
    .admin-textarea:focus { border-color: var(--primary); }
    .admin-hint {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 0.35rem;
      line-height: 1.5;
    }
    .admin-hint code {
      background: #1a1a26;
      border-radius: 3px;
      padding: 0.1rem 0.3rem;
      font-size: 0.7rem;
      color: var(--secondary);
    }
    .admin-save-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-top: 1.5rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
    }
    .admin-save-btn {
      padding: 0.7rem 1.75rem;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-family: var(--font-display);
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(168,85,247,0.3);
      transition: opacity 0.2s, transform 0.15s;
    }
    .admin-save-btn:hover { opacity: 0.85; transform: scale(1.02); }
    .admin-save-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .admin-status { font-size: 0.8rem; font-weight: 600; }
    .admin-status.ok { color: #22c55e; }
    .admin-status.err { color: var(--danger); }
    .admin-row-list { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 0.5rem; }
    .admin-row-item { display: flex; gap: 0.5rem; align-items: flex-start; }
    .admin-card-item {
      background: #111118;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 0.5rem;
    }
    .admin-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.25rem;
    }
    .admin-card-label {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .admin-row-input {
      flex: 1;
      background: #111118;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.52rem 0.75rem;
      color: var(--text);
      font-size: 0.85rem;
      font-family: var(--font-body);
      outline: none;
      transition: border-color 0.2s;
      min-width: 0;
    }
    .admin-row-input:focus { border-color: var(--primary); }
    .admin-row-input::placeholder { color: var(--muted); }

    /* ── Toggle Switch ── */
    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      height: 32px; /* match input height */
    }
    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 38px;
      height: 22px;
      flex-shrink: 0;
    }
    .toggle-switch input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-track {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .toggle-track::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--muted);
      transition: transform 0.2s, background 0.2s;
    }
    .toggle-switch input:checked + .toggle-track { background: rgba(34,197,94,0.25); border-color: rgba(34,197,94,0.5); }
    .toggle-switch input:checked + .toggle-track::after { transform: translateX(16px); background: #22c55e; }
    .toggle-switch.admin-toggle input:checked + .toggle-track { background: var(--primary-dim); border-color: rgba(168,85,247,0.5); }
    .toggle-switch.admin-toggle input:checked + .toggle-track::after { background: var(--primary); }
    .toggle-switch.editor-toggle input:checked + .toggle-track { background: rgba(34,211,238,0.2); border-color: rgba(34,211,238,0.5); }
    .toggle-switch.editor-toggle input:checked + .toggle-track::after { background: var(--secondary); }
    .toggle-switch.orders-toggle input:checked + .toggle-track { background: rgba(34,197,94,0.2); border-color: rgba(34,197,94,0.5); }
    .toggle-switch.orders-toggle input:checked + .toggle-track::after { background: #22c55e; }
    .toggle-label {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      transition: color 0.2s;
      min-width: 48px;
    }
    .toggle-switch input:checked ~ .toggle-label { color: var(--text); }
    .admin-card-input {
      width: 100%;
      background: #0d0d14;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.5rem 0.75rem;
      color: var(--text);
      font-size: 0.85rem;
      font-family: var(--font-body);
      outline: none;
      transition: border-color 0.2s;
    }
    .admin-card-input:focus { border-color: var(--primary); }
    .admin-card-input::placeholder { color: var(--muted); }
    .admin-row-remove {
      flex-shrink: 0;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      padding: 0.45rem 0.6rem;
      font-size: 0.8rem;
      line-height: 1;
      transition: border-color 0.2s, color 0.2s;
    }
    .admin-row-remove:hover { border-color: var(--danger); color: var(--danger); }
    .admin-add-btn {
      width: 100%;
      background: transparent;
      border: 1px dashed rgba(168,85,247,0.4);
      border-radius: 6px;
      color: var(--primary);
      cursor: pointer;
      padding: 0.55rem 1rem;
      font-size: 0.7rem;
      font-family: var(--font-display);
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: border-color 0.2s, background 0.2s;
      margin-top: 0.25rem;
    }
    .admin-add-btn:hover { border-color: var(--primary); background: var(--primary-dim); }
    .admin-sublabel {
      font-family: var(--font-display);
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--secondary);
      margin: 1.25rem 0 0.6rem;
    }
    .admin-divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }

        
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,10,15,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 2rem; height: 56px;
    }
    #main-content.visible { display: block; }
  </style>
</head>
<body>


<div id="auth-wall">
  <div class="auth-box">
    <div class="auth-logo">
      <img src="https://assets.cdn.filesafe.space/LiVJbIgv34a0ebVd0Lef/media/69c5fbcf9619ac2fc59a966f.png" alt="KnowWhere">
      <div class="auth-logo-name">KNOW<span>WHERE</span></div>
    </div>
    <form class="auth-form" id="login-form-wrap" autocomplete="on" onsubmit="handleAuth();return false;">
      <div class="auth-field">
        <label>Email</label>
        <input type="email" id="auth-email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="auth-field">
        <label>Password</label>
        <input type="password" id="auth-password" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <div class="auth-error" id="auth-error"></div>
      <button class="auth-submit" id="auth-submit" type="submit">Login</button>
    </form>
  </div>
</div>


<div id="main-content">

<script>

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}


// ── Admin: render shop editor ──
function renderShopEditor(items) {
  const list = document.getElementById('ae-shop-list');
  if (!list) return;
  list.innerHTML = (items || []).map((item, i) => shopEditorCard(item, i + 1)).join('');
}

function shopEditorCard(item, n) {
  const safeImg   = escHtml(item.img   || '');
  const safeName  = escHtml(item.name  || '');
  const safePrice = escHtml(item.price || '');
  return `
  <div class="admin-card-item">
    <div class="admin-card-header">
      <span class="admin-card-label">Drink ${n}</span>
      <button class="admin-row-remove" onclick="this.closest('.admin-card-item').remove()">✕</button>
    </div>
    <input class="shop-item-name admin-card-input" placeholder="Name (e.g. Monster Zero)" value="${safeName}" />
    <input class="shop-item-price admin-card-input" placeholder="Price (e.g. 3.99)" value="${safePrice}" type="number" min="0" step="0.01" />
    <input class="shop-item-img admin-card-input" placeholder="Image URL (transparent PNG recommended)" onchange="adminHandleShopImgChange(this)" onpaste="adminHandleShopImgPaste(event,this)" value="${safeImg}" />
    ${safeImg ? `<img src="${safeImg}" alt="preview" style="height:60px;object-fit:contain;margin-top:0.25rem;opacity:0.85;filter:drop-shadow(0 2px 6px rgba(168,85,247,0.3));" onerror="this.style.display='none'" />` : ''}
  </div>`;
}

window.adminAddShopItem = function() {
  const list = document.getElementById('ae-shop-list');
  const n = list.querySelectorAll('.admin-card-item').length + 1;
  const div = document.createElement('div');
  div.innerHTML = shopEditorCard({}, n);
  list.appendChild(div.firstElementChild);
  list.lastElementChild.querySelector('.shop-item-name').focus();
};
</script>

    get: () => auth.currentUser ? auth.currentUser.email : null,
    configurable: true
  });

    const completedAt = new Date().toISOString();
    const patch = { completed: true, completedAt };
    
    await updateDoc(doc(db, 'orders', orderId), patch);
    
    try {
      const topSnap = await getDoc(doc(db, 'orders', orderId));
      if (topSnap.exists()) {
        const email = topSnap.data().email;
        if (email) {
          await updateDoc(doc(db, 'users', email, 'orders', orderId), patch);
        }
      }
    } catch(e) { console.warn('Could not sync completed status to user subcollection:', e); }
  };

  
  window._markOrderActive = async function(orderId) {
    const patch = { completed: false, completedAt: null };

    try {
      const topSnap = await getDoc(doc(db, 'orders', orderId));

  window._fetchS3Creds = async function() {

  };

    const snap = await getDocs(collection(db, 'signupRequests'));
    return snap.docs.map(d => ({ id: d.id, ...d.data() }));
  };

  
  window._fetchAllUsers = async function() {
    const snap = await getDocs(collection(db, 'users'));
    return snap.docs.map(d => ({ id: d.id, ...d.data() }));
  };

  
  window._updateUserProfile = async function(email, patch) {
    await updateDoc(doc(db, 'users', email), patch);
  };

  
  window._saveUserPassword = async function(email, newPassword) {
    
    const secondaryAppName = 'secondary-pwchange-' + Date.now();
    const secondaryApp = initializeApp(firebaseConfig, secondaryAppName);
    const secondaryAuth = getAuth(secondaryApp);

      await signInWithEmailAndPassword(secondaryAuth, email, newPassword);
    } catch(e) {
      
    } finally {
      await signOut(secondaryAuth).catch(() => {});
      await deleteApp(secondaryApp).catch(() => {});
    }
    
    await setDoc(doc(db, 'users', email), { password: newPassword }, { merge: true });
  };

  
  window._updateSignupRequestPassword = async function(requestId, newPassword) {
    await updateDoc(doc(db, 'signupRequests', requestId), { password: newPassword });
  };

  
  
  window._approveSignup = async function(requestId, email, password, fullName, username) {
    
    
    const secondaryAppName = 'secondary-signup-' + Date.now();
    const secondaryApp = initializeApp(firebaseConfig, secondaryAppName);

      await createUserWithEmailAndPassword(secondaryAuth, email, password);

    }

    
    await setDoc(doc(db, 'users', email), {

    await updateDoc(doc(db, 'signupRequests', requestId), {

  window.switchTab = function(tab) {

      clearInterval(window._retryCountdownInterval);
      window._retryCountdownInterval = null;
    }
  };

  
  function friendlyError(code) {
    const map = {
      'auth/invalid-email': 'That email address doesn\'t look right.',
      'auth/user-not-found': 'No account found with that email.',
      'auth/wrong-password': 'Incorrect password. Try again.',
      'auth/email-already-in-use': 'An account with that email already exists.',
      'auth/weak-password': 'Password must be at least 6 characters.',
      'auth/too-many-requests': 'Too many attempts. Try again later.',
      'auth/invalid-credential': 'Email or password is incorrect.',
    };
    return map[code] || 'Something went wrong. Please try again.';
  }

  
  window.handleAuth = async function() {
    const email = document.getElementById('auth-email').value.trim();
    const password = document.getElementById('auth-password').value;
    const errEl = document.getElementById('auth-error');
    const btn = document.getElementById('auth-submit');

    errEl.classList.remove('show');
    if (!email || !password) { errEl.textContent = 'Please fill in all fields.'; errEl.classList.add('show'); return; }

    btn.disabled = true;
    btn.textContent = 'Logging in...';

    try {
      const cred = await signInWithEmailAndPassword(auth, email, password);
      const user = cred.user;
      
      
      
    } catch (err) {
      errEl.textContent = friendlyError(err.code);
      errEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Login';
    }
  };


  
  
  window.toggleUserPopup = function() {
    const popup = document.getElementById('user-popup');
    popup.classList.toggle('open');
    
    document.querySelectorAll('.popup-inline-form').forEach(f => f.classList.remove('open'));
    document.querySelectorAll('.popup-msg').forEach(m => { m.className = 'popup-msg'; });
  };

  window.togglePopupForm = function(id) {
    const form = document.getElementById(id);
    const isOpen = form.classList.contains('open');
    document.querySelectorAll('.popup-inline-form').forEach(f => f.classList.remove('open'));
    document.querySelectorAll('.popup-msg').forEach(m => { m.className = 'popup-msg'; });
    if (!isOpen) {
      form.classList.add('open');
      
      if (id === 'password-form') {
        const emailField = document.getElementById('password-form-username');
        if (emailField && auth.currentUser) emailField.value = auth.currentUser.email;
      }
    }
  };

  
  document.addEventListener('click', (e) => {

      popup.classList.remove('open');

  });

  window.saveUsername = async function() {
    const val = document.getElementById('new-username').value.trim();
    const msg = document.getElementById('username-msg');
    msg.className = 'popup-msg';
    if (!val) { msg.textContent = 'Please enter a username.'; msg.className = 'popup-msg err'; return; }
    try {
      
      const valLower = val.toLowerCase();
      const usersSnap = await getDocs(collection(db, 'users'));
      for (const d of usersSnap.docs) {
        if (d.id === auth.currentUser.email) continue; 
        const uData = d.data();
        if (uData.username && uData.username.toLowerCase() === valLower) {
          msg.textContent = 'That username is already taken.';
          msg.className = 'popup-msg err';
          return;
        }
      }
      const reqSnap = await getDocs(collection(db, 'signupRequests'));
      for (const d of reqSnap.docs) {
        const rData = d.data();
        if (rData.username && rData.username.toLowerCase() === valLower &&
            (rData.status === 'pending' || rData.status === 'approved')) {
          msg.textContent = 'That username is already taken.';
          msg.className = 'popup-msg err';
          return;
        }
      }
      await updateProfile(auth.currentUser, { displayName: val });
      await setDoc(doc(db, 'users', auth.currentUser.email), { username: val }, { merge: true });
      
      const nameBtn = document.querySelector('.auth-user-name');
      if (nameBtn) {
        
        for (let i = nameBtn.childNodes.length - 1; i >= 0; i--) {
          if (nameBtn.childNodes[i].nodeType === 3) {
            nameBtn.childNodes[i].textContent = val;
            break;
          }
        }
      }
      document.getElementById('popup-display-name').textContent = val;
      document.getElementById('new-username').value = '';
      msg.textContent = 'Username updated!';
      msg.className = 'popup-msg ok';
      setTimeout(() => { msg.className = 'popup-msg'; togglePopupForm('username-form'); }, 1500);
    } catch(e) {
      console.error('saveUsername error:', e.code, e.message);
      msg.textContent = e.message || 'Failed to update username.';
      msg.className = 'popup-msg err';
    }
  };

  window.savePassword = async function() {
    const pw = document.getElementById('new-password').value;
    const cpw = document.getElementById('confirm-password').value;
    const msg = document.getElementById('password-msg');
    msg.className = 'popup-msg';
    if (!pw) { msg.textContent = 'Please enter a password.'; msg.className = 'popup-msg err'; return; }
    if (pw.length < 6) { msg.textContent = 'Password must be at least 6 characters.'; msg.className = 'popup-msg err'; return; }
    if (pw !== cpw) { msg.textContent = 'Passwords do not match.'; msg.className = 'popup-msg err'; return; }
    try {
      await updatePassword(auth.currentUser, pw);
      
      try {
        await setDoc(doc(db, 'users', auth.currentUser.email), { password: pw }, { merge: true });

      document.getElementById('new-password').value = '';
      document.getElementById('confirm-password').value = '';
      msg.textContent = 'Password updated!';
      msg.className = 'popup-msg ok';
      setTimeout(() => { msg.className = 'popup-msg'; togglePopupForm('password-form'); }, 1500);
    } catch(e) {
      if (e.code === 'auth/requires-recent-login') {
        msg.textContent = 'Please sign out and sign in again first.';
      } else {
        msg.textContent = 'Failed to update password.';
      }
      msg.className = 'popup-msg err';
    }
  };

  window.handleSignOut = async function() {
    await signOut(auth);
  };

  
  
  
  let _forcedSignout = false;

  onAuthStateChanged(auth, async (user) => {
    const wall = document.getElementById('auth-wall');
    const main = document.getElementById('main-content');
    const badge = document.getElementById('nav-user-badge');

    
    if (!user && _forcedSignout) {
      _forcedSignout = false;
      wall.classList.remove('hidden');
      main.classList.remove('visible');
      if (badge) badge.innerHTML = '';
      const errEl = document.getElementById('auth-error');
      if (errEl) {
        errEl.textContent = 'Your account has been disabled. Contact an admin for help.';
        errEl.classList.add('show');
      }
      return;
    }

    if (user) {
      
      
      try {
        const activeSnap = await getDoc(doc(db, 'users', user.email));
        if (activeSnap.exists()) {
          const d = activeSnap.data();
          if (d.active === false && d.admin !== true) {
            _forcedSignout = true;
            await signOut(auth);
            
            return;
          }
        }
      } catch(e) {
        
        
        console.warn('Could not verify account status — signing out for safety:', e);
        _forcedSignout = true;
        await signOut(auth);
        return;
      }

      
      wall.classList.add('hidden');
      main.classList.add('visible');

      
      let username = user.email;
      let fullName = '';
      try {
        const snap = await getDoc(doc(db, 'users', user.email));
        if (snap.exists()) {
          const snapData = snap.data();
          if (snapData.username) {
            username = snapData.username;
            if (user.displayName !== username) {
              await updateProfile(user, { displayName: username });
            }
          } else {
            username = user.displayName || user.email;
          }
          fullName = snapData.fullName || '';
        } else {
          username = user.displayName || user.email;
        }
      } catch(e) {
        username = user.displayName || user.email;
      }

      if (badge) {
        badge.innerHTML = `
          <span class="auth-user-name" style="cursor:default;">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            ${username}
          </span>`;
      }

      
      try {
        const contentSnap = await getDoc(doc(db, 'siteContent', 'main'));
        if (contentSnap.exists()) window._siteData = contentSnap.data();
      } catch (e) {}

      
      try {
        const userSnap = await getDoc(doc(db, 'users', user.email));
        const userData = userSnap.exists() ? userSnap.data() : {};
        const isAdmin  = userData.admin  === true;
        const isEditor = userData.editor === true;

        if (isAdmin || isEditor) {
          window._isAdmin  = isAdmin;
          window._isEditor = isEditor && !isAdmin;
          injectAdminPanels();
          setTimeout(() => openAdminPanel(), 100);
        } else {
          window.location.href = '/';
        }
        
        window._canSeeAllOrders = (userData.orders === true || userData.admin === true);

        
        const ordersSection = document.getElementById('orders-popup-section');
        if (ordersSection) ordersSection.style.display = 'block';
      } catch(e) {
        console.warn('Could not check admin/editor status:', e);
      }

    } else {
      wall.classList.remove('hidden');
      main.classList.remove('visible');
      if (badge) badge.innerHTML = '';
      
      document.getElementById('auth-email').value = '';
      document.getElementById('auth-password').value = '';
      document.getElementById('auth-error').classList.remove('show');
    }
  });

  
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !document.getElementById('auth-wall').classList.contains('hidden')) {
      const loginVisible = document.getElementById('login-form-wrap').style.display !== 'none';
      if (loginVisible) handleAuth();
    }
  });
</script>

function escAttr(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

window.openApprovalsPanel = function() {
  if (!window._isAdmin) return;

  if (!panel) return;
  panel.style.display = 'flex';
  window._approvalsTab = window._approvalsTab || 'requests';
  switchApprovalsTab(window._approvalsTab);
  
};

window.closeApprovalsPanel = function() {
  const panel = document.getElementById('approvals-panel');
  if (panel) panel.style.display = 'none';
};

window.switchApprovalsTab = function(tab) {
  window._approvalsTab = tab;
  const reqTab = document.getElementById('ap-tab-requests');
  const usrTab = document.getElementById('ap-tab-users');
  if (reqTab && usrTab) {
    const active = 'border-bottom:2px solid var(--primary);color:var(--primary);';
    const inactive = 'border-bottom:2px solid transparent;color:var(--muted);';
    reqTab.style.cssText = reqTab.style.cssText.replace(/border-bottom:[^;]+;color:[^;]+;/g, '');
    usrTab.style.cssText = usrTab.style.cssText.replace(/border-bottom:[^;]+;color:[^;]+;/g, '');
    if (tab === 'requests') {
      reqTab.style.borderBottom = '2px solid var(--primary)';
      reqTab.style.color = 'var(--primary)';
      usrTab.style.borderBottom = '2px solid transparent';
      usrTab.style.color = 'var(--muted)';
      const _s = document.getElementById('user-search'); if (_s) _s.value = '';
      loadSignupRequests();

      usrTab.style.color = 'var(--primary)';
      reqTab.style.borderBottom = '2px solid transparent';
      reqTab.style.color = 'var(--muted)';

};

window.refreshApprovalsPanel = function() {

window.loadSignupRequests = async function() {
  const list = document.getElementById('approvals-list');
  const summary = document.getElementById('approvals-summary');
  list.innerHTML = '<div style="color:var(--muted);font-size:0.8rem;text-align:center;padding:2rem 0;">Loading...</div>';
  summary.textContent = '';

  try {
    const requests = await window._fetchSignupRequests();
    const pending = requests.filter(r => r.status === 'pending');
    const others  = requests.filter(r => r.status !== 'pending').sort((a,b) => (b.approvedAt||b.deniedAt||'').localeCompare(a.approvedAt||a.deniedAt||''));

    summary.textContent = `${pending.length} pending · ${requests.length} total`;

    if (!requests.length) {
      list.innerHTML = '<div style="color:var(--muted);font-size:0.8rem;text-align:center;padding:2rem 0;">No signup requests yet.</div>';
      return;
    }

    const renderRow = (r) => {
      const isPending = r.status === 'pending';
      const date = new Date(r.requestedAt).toLocaleDateString('en-US', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
      const statusColor = r.status === 'approved' ? '#22c55e' : r.status === 'denied' ? 'var(--danger)' : 'var(--secondary)';
      const statusLabel = r.status === 'approved' ? '✓ Approved' : r.status === 'denied' ? '✗ Denied' : '⏳ Pending';
      const safeFullName = (r.fullName || '').replace(/'/g, "\\'");
      const safeUsername = (r.username || '').replace(/'/g, "\\'");
      const safeId = r.id;

      return `<div style="display:flex;flex-direction:column;gap:0.5rem;padding:0.75rem;background:#0d0d14;border:1px solid ${isPending ? 'rgba(168,85,247,0.3)' : 'var(--border)'};border-radius:8px;">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:0.5rem;flex-wrap:wrap;">
          <div style="display:flex;flex-direction:column;gap:0.1rem;min-width:0;">
            ${r.fullName ? `<span style="font-size:0.9rem;font-weight:700;color:var(--text);font-family:var(--font-display);letter-spacing:0.03em;">${escHtml(r.fullName)}</span>` : ''}
            ${r.username ? `<span style="font-size:0.75rem;color:var(--primary);font-weight:600;">@${escHtml(r.username)}</span>` : ''}
            <span style="font-size:0.85rem;font-weight:600;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escHtml(r.email)}</span>
            <span style="font-size:0.7rem;color:var(--muted);">Requested ${date}</span>
            ${r.password ? `<div style="margin-top:0.2rem;display:flex;align-items:center;gap:0.4rem;">
              <span style="font-size:0.65rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);">Password:</span>
              <span class="req-pw-mask" data-pw="${escAttr(r.password)}" style="font-size:0.78rem;color:var(--text);font-family:monospace;letter-spacing:0.05em;cursor:pointer;user-select:none;" onclick="toggleReqPw(this)" title="Click to reveal">••••••••</span>
            </div>` : ''}
          </div>
          <span style="font-size:0.7rem;font-weight:700;color:${statusColor};flex-shrink:0;">${statusLabel}</span>
        </div>
        ${isPending ? `
        <div style="display:flex;gap:0.5rem;">
          <button onclick="approveRequest('${safeId}','${r.email}','${r.password}','${safeFullName}','${safeUsername}')" style="flex:1;padding:0.5rem;background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.4);border-radius:6px;color:#22c55e;font-family:var(--font-display);font-size:0.6rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:background 0.2s;" onmouseover="this.style.background='rgba(34,197,94,0.22)'" onmouseout="this.style.background='rgba(34,197,94,0.12)'">✓ Approve</button>
          <button onclick="denyRequest('${safeId}')" style="flex:1;padding:0.5rem;background:var(--danger-dim);border:1px solid rgba(239,68,68,0.3);border-radius:6px;color:var(--danger);font-family:var(--font-display);font-size:0.6rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:background 0.2s;" onmouseover="this.style.background='rgba(239,68,68,0.2)'" onmouseout="this.style.background='var(--danger-dim)'">✗ Deny</button>
        </div>` : ''}
      </div>`;
    };

    list.innerHTML = [
      ...pending.map(renderRow),
      ...(others.length && pending.length ? ['<div style="border-top:1px solid var(--border);margin:0.25rem 0;"></div>'] : []),
      ...others.map(renderRow)
    ].join('');

  } catch(e) {
    list.innerHTML = `<div style="color:var(--danger);font-size:0.8rem;text-align:center;padding:2rem 0;">Failed to load: ${e.message}</div>`;
  }
};


window.toggleReqPw = function(el) {
  const pw = el.dataset.pw;
  const shown = el.dataset.shown === '1';
  el.textContent = shown ? '••••••••' : pw;
  el.dataset.shown = shown ? '0' : '1';
};

window.approveRequest = async function(requestId, email, password, fullName, username) {
  const btn = event && event.target;
  if (btn) { btn.disabled = true; btn.textContent = 'Creating...'; }
  try {
    await window._approveSignup(requestId, email, password, fullName, username);
    loadSignupRequests();
  } catch(e) {
    alert('Failed to approve: ' + e.message);
    if (btn) { btn.disabled = false; btn.textContent = '✓ Approve'; }
  }
};

window.denyRequest = async function(requestId) {
  if (!confirm('Deny this signup request?')) return;
  try {
    await window._denySignup(requestId);
    loadSignupRequests();
  } catch(e) {
    alert('Failed to deny: ' + e.message);
  }
};


window._allUsers = [];

window.loadApprovedUsers = async function() {
  const list = document.getElementById('approvals-list');
  const summary = document.getElementById('approvals-summary');
  list.innerHTML = '<div style="color:var(--muted);font-size:0.8rem;text-align:center;padding:2rem 0;">Loading...</div>';
  summary.textContent = '';

  
  const searchEl = document.getElementById('user-search');
  if (searchEl) searchEl.value = '';

  try {
    const users = await window._fetchAllUsers();
    window._allUsers = users.sort((a,b) => (a.username||a.email).localeCompare(b.username||b.email));

    if (!users.length) {
      list.innerHTML = '<div style="color:var(--muted);font-size:0.8rem;text-align:center;padding:2rem 0;">No approved users yet.</div>';
      summary.textContent = '0 users';
      return;
    }

    renderUserList(window._allUsers);

  } catch(e) {
    list.innerHTML = `<div style="color:var(--danger);font-size:0.8rem;text-align:center;padding:2rem 0;">Failed to load: ${e.message}</div>`;
  }
};

function renderUserList(users) {
  const list = document.getElementById('approvals-list');
  const summary = document.getElementById('approvals-summary');
  summary.textContent = `${users.length} of ${window._allUsers.length} user${window._allUsers.length !== 1 ? 's' : ''}`;
  if (!users.length) {
    list.innerHTML = '<div style="color:var(--muted);font-size:0.8rem;text-align:center;padding:2rem 0;">No users match your search.</div>';
    return;
  }
  list.innerHTML = users.map(u => renderUserCard(u)).join('');
}

window.filterUsers = function(query) {
  const q = query.trim().toLowerCase();
  if (!q) {
    renderUserList(window._allUsers);
    return;
  }
  const filtered = window._allUsers.filter(u => {
    return (u.email      || '').toLowerCase().includes(q)
        || (u.username   || '').toLowerCase().includes(q)
        || (u.fullName   || '').toLowerCase().includes(q);
  });
  renderUserList(filtered);
};

window.updateToggleLabel = function(labelId, checked, onText, offText) {
  const el = document.getElementById(labelId);
  if (!el) return;
  el.textContent = checked ? onText : offText;
  if (onText === 'Active')      el.style.color = checked ? '#22c55e' : 'var(--danger)';
  else if (onText === 'Admin')  el.style.color = checked ? 'var(--primary)' : 'var(--muted)';
  else if (onText === 'Editor') el.style.color = checked ? 'var(--secondary)' : 'var(--muted)';
  else if (onText === 'Orders') el.style.color = checked ? '#22c55e' : 'var(--muted)';
  else                          el.style.color = checked ? 'var(--primary)' : 'var(--muted)';
};

function renderGamesEditor(gamesObj) {
  const flat = [];
  for (const [, games] of Object.entries(gamesObj || {}).sort(([a],[b]) => a.localeCompare(b))) {

  }
  document.getElementById('ae-games-list').innerHTML = flat.map(g => renderGameRow(g)).join('');
}

function normalizeGameKey(name) {
  return (name || '').trim().toLowerCase();
}

function flattenGames(gamesObj) {
  const flat = [];
  for (const [, games] of Object.entries(gamesObj || {}).sort(([a],[b]) => a.localeCompare(b))) {
    for (const g of games || []) flat.push(g);
  }
  return flat;
}

function mergeGameEditorChanges(latestGamesObj, originalGamesObj, rows) {
  const latestMap = new Map();
  flattenGames(latestGamesObj).forEach(game => {
    const key = normalizeGameKey(game.name);
    if (key) latestMap.set(key, { ...game });
  });

  const originalMap = new Map();
  flattenGames(originalGamesObj).forEach(game => {
    const key = normalizeGameKey(game.name);
    if (key) originalMap.set(key, { ...game });
  });

  const remainingOriginalKeys = new Set(originalMap.keys());

  rows.forEach(row => {
    const name = row.querySelector('.game-name-input').value.trim();
    const alias = row.querySelector('.game-alias-input').value.trim();
    const url = row.querySelector('.game-url-input').value.trim();
    const screenshot = row.querySelector('.game-screenshot-input').value.trim();
    const originalName = (row.dataset.originalName || '').trim();
    const originalKey = normalizeGameKey(originalName);
    const nextKey = normalizeGameKey(name);
    const originalGame = originalKey ? originalMap.get(originalKey) : null;
    const nextGame = name ? { name, url } : null;
    if (nextGame && alias) nextGame.alias = alias;
    if (nextGame && screenshot) nextGame.screenshot = screenshot;

    if (originalKey) remainingOriginalKeys.delete(originalKey);

    if (!originalGame) {
      if (nextGame) latestMap.set(nextKey, nextGame);
      return;
    }

    const originalComparable = {
      name: originalGame.name || '',
      url: originalGame.url || ''
    };
    if (originalGame.alias) originalComparable.alias = originalGame.alias;
    if (originalGame.screenshot) originalComparable.screenshot = originalGame.screenshot;

    const nextComparable = nextGame ? {
      name: nextGame.name || '',
      url: nextGame.url || ''
    } : null;
    if (nextComparable && nextGame.alias) nextComparable.alias = nextGame.alias;
    if (nextComparable && nextGame.screenshot) nextComparable.screenshot = nextGame.screenshot;

    const unchanged = JSON.stringify(originalComparable) === JSON.stringify(nextComparable);
    if (unchanged) return;

    latestMap.delete(originalKey);
    if (nextGame) latestMap.set(nextKey, nextGame);
  });

  remainingOriginalKeys.forEach(key => {
    latestMap.delete(key);
  });

  const mergedGames = {};
  Array.from(latestMap.values())
    .sort((a, b) => a.name.localeCompare(b.name))
    .forEach(game => {
      const letter = (game.name[0] || '#').toUpperCase();
      if (!mergedGames[letter]) mergedGames[letter] = [];
      mergedGames[letter].push(game);
    });

  return mergedGames;
}

function adminSetGameUploadBtnState(btn, state) {
  if (!btn) return;
  if (!btn.dataset.defaultHtml) btn.dataset.defaultHtml = btn.innerHTML;
  if (state === 'uploading') {
    btn.disabled = true;
    btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="animation:spin-sm 0.7s linear infinite;"><circle cx="12" cy="12" r="8" stroke-opacity="0.35"></circle><path d="M20 12a8 8 0 0 0-8-8"></path></svg>';
    return;
  }
  if (state === 'success') {
    btn.disabled = false;
    btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>';
    setTimeout(() => {
      btn.innerHTML = btn.dataset.defaultHtml;
    }, 1200);
    return;
  }
  if (state === 'error') {
    btn.disabled = false;
    btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
    setTimeout(() => {
      btn.innerHTML = btn.dataset.defaultHtml;
    }, 1600);
    return;
  }
  btn.disabled = false;
  btn.innerHTML = btn.dataset.defaultHtml;
}

function _nameFileFromContext(file, input) {
  var name = "";
  var row = input && input.closest(".admin-row-item");
  if (row) { var ni = row.querySelector(".game-name-input"); if (ni) name = ni.value.trim(); }
  if (!name) {
    var card = input && input.closest(".admin-card-item");
    if (card) { var si = card.querySelector(".shop-item-name"); if (si) name = si.value.trim(); }
  }
  if (!name) return file;
  var ext = s3GuessExtension(file);
  var safeBase = name.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/-+/g, "-").replace(/^-|-$/g, "") || "image";
  return new File([file], safeBase + "." + ext, { type: file.type });
}

async function adminUploadGameScreenshotFile(file, input, btn) {
  if (!file || !input || !btn) return;
  adminSetGameUploadBtnState(btn, 'uploading');
  try {
    const uploaded = await s3UploadFile(_nameFileFromContext(file, input));
    input.value = uploaded.url;
    adminSetGameUploadBtnState(btn, 'success');
  } catch (e) {
    adminSetGameUploadBtnState(btn, 'error');
    alert('Upload failed: ' + e.message);
  }
}

window.adminHandleGameScreenshotFiles = function(fileInput) {
  const file = fileInput && fileInput.files && fileInput.files[0];
  if (!file) return;
  const row = fileInput.closest('.admin-row-item');
  const input = row && row.querySelector('.game-screenshot-input');
  const btn = row && row.querySelector('.admin-game-upload-btn');
  adminUploadGameScreenshotFile(file, input, btn).finally(() => {
    fileInput.value = '';
  });
};

async function adminImportGameScreenshotUrl(url, input, btn) {
  const trimmed = (url || '').trim();
  if (!trimmed || isS3ImageUrl(trimmed)) return false;
  adminSetGameUploadBtnState(btn, 'uploading');
  try {
    const file = await s3FileFromUrl(trimmed);
    const uploaded = await s3UploadFile(_nameFileFromContext(file, input));
    input.value = uploaded.url;
    adminSetGameUploadBtnState(btn, 'success');
    return true;
  } catch (e) {
    adminSetGameUploadBtnState(btn, 'error');
    alert('Image import failed: ' + e.message);
    return false;
  }
}

window.adminHandleGameScreenshotPaste = function(e, input) {
  const row = input.closest('.admin-row-item');
  const btn = row && row.querySelector('.admin-game-upload-btn');
  const items = Array.from((e.clipboardData && e.clipboardData.items) || []);
  const imageItem = items.find(item => item.kind === 'file' && item.type.startsWith('image/'));
  if (imageItem) {
    const file = imageItem.getAsFile();
    if (!file) return;
    e.preventDefault();
    adminUploadGameScreenshotFile(file, input, btn);
    return;
  }
  const pastedText = e.clipboardData && e.clipboardData.getData('text');
  if (looksLikeImageUrl(pastedText) && !isS3ImageUrl(pastedText)) {
    e.preventDefault();
    adminImportGameScreenshotUrl(pastedText, input, btn);
  }
};

window.adminHandleGameScreenshotUrlChange = function(input) {
  const value = input.value.trim();
  if (!looksLikeImageUrl(value) || isS3ImageUrl(value) || input.dataset.importing === 'true') return;
  const row = input.closest('.admin-row-item');
  const btn = row && row.querySelector('.admin-game-upload-btn');
  input.dataset.importing = 'true';
  adminImportGameScreenshotUrl(value, input, btn).finally(() => {
    input.dataset.importing = 'false';
  });
};

window.adminSave = async function(section) {
  if (!window._isAdmin) return;
  const statusEl = document.getElementById('status-' + section);
  const btn = document.querySelector('#admin-' + section + ' .admin-save-btn');
  statusEl.textContent = 'Saving...';
  statusEl.className = 'admin-status';
  if (btn) btn.disabled = true;

  try {
    let patch = {};

    if (section === 'toptier') {
      patch.topTier = [...document.querySelectorAll('#ae-toptier-list .admin-card-item')].map(card => ({
        name:            card.querySelector('.tt-name').value.trim(),
        badge:           card.querySelector('.tt-badge').value.trim(),
        url:             card.querySelector('.tt-url').value.trim(),
        backgroundImage: card.querySelector('.tt-bg').value.trim()
      }));
    } else if (section === 'games') {
      const latestData = await window._firestoreGetSiteContent();
      const rows = [...document.querySelectorAll('#ae-games-list .admin-row-item')];
      const mergedGames = mergeGameEditorChanges(
        latestData.games || {},
        window._adminOriginalData?.games || {},
        rows
      );
      patch.games = mergedGames;
      window._siteData = Object.assign({}, latestData, { games: mergedGames });
      window._adminOriginalData = Object.assign({}, window._adminOriginalData || {}, { games: JSON.parse(JSON.stringify(mergedGames)) });
    } else if (section === 'sites') {
      patch.sites = [...document.querySelectorAll('#ae-sites-list .admin-row-item')].map(row => {
        const [n, u] = row.querySelectorAll('input');
        return { name: n.value.trim(), url: u.value.trim() };
      }).filter(s => s.name);
    } else if (section === 'shop') {
      patch.shop = [...document.querySelectorAll('#ae-shop-list .admin-card-item')].map(card => ({
        name:  card.querySelector('.shop-item-name').value.trim(),
        price: card.querySelector('.shop-item-price').value.trim(),
        img:   card.querySelector('.shop-item-img').value.trim()
      })).filter(s => s.name);
      
      renderShop(patch.shop);
    } else if (section === 'banned') {
      patch.banned = [...document.querySelectorAll('#ae-banned-list .admin-row-item')]
        .map(row => row.querySelector('input').value.trim()).filter(Boolean);
    } else if (section === 'command') {
      patch.command = {
        hiring: {
          active:      document.getElementById('ae-hiring-active').value === 'true',
          badge:       document.getElementById('ae-hiring-badge').value.trim(),
          title:       document.getElementById('ae-hiring-title').value.trim(),
          description: document.getElementById('ae-hiring-desc').value.trim(),

let _s3Creds = null;
let _s3AllImages = [];


async function _sha256(message) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(message));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}
async function _sha256Bytes(ab) {
  const buf = await crypto.subtle.digest('SHA-256', ab);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}
async function _hmacSha256(key, data) {
  const k = typeof key === 'string' ? new TextEncoder().encode(key) : key;
  const ck = await crypto.subtle.importKey('raw', k, { name:'HMAC', hash:'SHA-256' }, false, ['sign']);
  return new Uint8Array(await crypto.subtle.sign('HMAC', ck, new TextEncoder().encode(data)));
}
async function _signingKey(secret, date, region, service) {
  const kDate    = await _hmacSha256('AWS4' + secret, date);
  const kRegion  = await _hmacSha256(kDate, region);
  const kService = await _hmacSha256(kRegion, service);
  return _hmacSha256(kService, 'aws4_request');
}
function _hex(buf) { return Array.from(buf).map(b => b.toString(16).padStart(2,'0')).join(''); }
function _amzNow() { return new Date().toISOString().replace(/[:\-]|\.\d{3}/g,'').slice(0,15)+'Z'; }
const EMPTY_HASH = 'e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855';


async function _s3Fetch(method, key, query, body, contentType) {
  const { region, bucket, keyId, secret } = _s3Creds;
  const host = `${bucket}.s3.${region}.amazonaws.com`;
  const amzDate = _amzNow();
  const dateStamp = amzDate.slice(0,8);
  const encodedKey = key ? '/' + key.split('/').map(encodeURIComponent).join('/') : '/';
  const payloadHash = body ? await _sha256Bytes(body) : EMPTY_HASH;
  const qs = query || '';

  const rawHeaders = {
    'host': host,
    'x-amz-content-sha256': payloadHash,
    'x-amz-date': amzDate,
    ...(contentType ? { 'content-type': contentType } : {})
  };
  const sortedNames = Object.keys(rawHeaders).sort();
  const canonicalHeaders = sortedNames.map(k => `${k}:${rawHeaders[k]}`).join('\n') + '\n';
  const signedHeadersStr = sortedNames.join(';');

  const canonicalRequest = [method, encodedKey, qs, canonicalHeaders, signedHeadersStr, payloadHash].join('\n');
  const credScope = `${dateStamp}/${region}/s3/aws4_request`;
  const stringToSign = ['AWS4-HMAC-SHA256', amzDate, credScope, await _sha256(canonicalRequest)].join('\n');
  const sk = await _signingKey(secret, dateStamp, region, 's3');
  const sig = _hex(await _hmacSha256(sk, stringToSign));
  const auth = `AWS4-HMAC-SHA256 Credential=${keyId}/${credScope}, SignedHeaders=${signedHeadersStr}, Signature=${sig}`;

  const fetchHeaders = {
    'Authorization': auth,
    'x-amz-date': amzDate,
    'x-amz-content-sha256': payloadHash,
    ...(contentType ? { 'Content-Type': contentType } : {})
  };
  const url = `https://${host}${encodedKey}${qs ? '?' + qs : ''}`;
  return fetch(url, { method, headers: fetchHeaders, body: body || undefined });
}

  }

    await window._saveS3Creds(creds);

};


window.s3Connect = async function() {
  const statusEl = document.getElementById('s3-status');
  const grid = document.getElementById('s3-image-grid');
  if (!_s3Creds || !_s3Creds.keyId) {
    statusEl.textContent = '⚠ Enter and save credentials first.'; return;
  }
  statusEl.textContent = 'Connecting…';
  grid.innerHTML = '<div style="grid-column:1/-1;color:var(--muted);font-size:0.8rem;text-align:center;padding:1.5rem 0;">Loading…</div>';
  _s3AllImages = [];

  try {
    let token = null;
    const prefix = _s3Creds.prefix || '';
    const IMAGE_RE = /\.(jpg|jpeg|png|gif|webp|svg|bmp|ico)$/i;

    do {
      let qs = 'list-type=2';
      if (prefix) qs += '&prefix=' + encodeURIComponent(prefix);
      if (token)  qs += '&continuation-token=' + encodeURIComponent(token);

      const res = await _s3Fetch('GET', '', qs, null, null);
      if (!res.ok) {
        const txt = await res.text();
        const msg = txt.match(/<Message>(.*?)<\/Message>/)?.[1] || `HTTP ${res.status}`;
        throw new Error(msg);
      }
      const xml = new DOMParser().parseFromString(await res.text(), 'text/xml');
      xml.querySelectorAll('Contents Key').forEach(el => {
        const k = el.textContent;
        if (IMAGE_RE.test(k)) _s3AllImages.push(k);
      });
      const truncated = xml.querySelector('IsTruncated')?.textContent === 'true';
      token = truncated ? xml.querySelector('NextContinuationToken')?.textContent : null;
    } while (token);

    statusEl.textContent = `${_s3AllImages.length} image${_s3AllImages.length !== 1 ? 's' : ''} found`;
    s3RenderGrid(_s3AllImages);
  } catch(e) {
    statusEl.textContent = '✗ ' + e.message;
    grid.innerHTML = `<div style="grid-column:1/-1;color:var(--danger);font-size:0.8rem;text-align:center;padding:1.5rem 0;">${escapeHtml(e.message)}</div>`;
  }
};


function s3RenderGrid(keys) {
  const grid = document.getElementById('s3-image-grid');
  const { region, bucket } = _s3Creds;
  if (!keys.length) {
    grid.innerHTML = '<div style="grid-column:1/-1;color:var(--muted);font-size:0.8rem;text-align:center;padding:1.5rem 0;">No images found.</div>';
    return;
  }
  grid.innerHTML = keys.map(key => {
    const url = `https://${bucket}.s3.${region}.amazonaws.com/${key.split('/').map(encodeURIComponent).join('/')}`;
    const name = key.split('/').pop();
    const safeKey = key.replace(/'/g, "\\'");
    const safeUrl = url.replace(/'/g, "\\'");
    return `<div style="position:relative;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:#0d0d14;aspect-ratio:1;"
      onmouseover="this.querySelector('.s3ia').style.opacity='1'"
      onmouseout="this.querySelector('.s3ia').style.opacity='0'">
      <img src="${url}" alt="${name}" loading="lazy" style="width:100%;height:100%;object-fit:cover;display:block;"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
      <div style="display:none;align-items:center;justify-content:center;height:100%;color:var(--muted);font-size:0.62rem;padding:0.35rem;text-align:center;word-break:break-all;">${name}</div>
      <div class="s3ia" style="position:absolute;inset:0;background:rgba(0,0,0,0.72);opacity:0;transition:opacity 0.18s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.35rem;padding:0.5rem;">
        <div style="font-size:0.58rem;color:rgba(255,255,255,0.65);text-align:center;word-break:break-all;max-height:2.4em;overflow:hidden;line-height:1.2;">${name}</div>
        <div style="display:flex;gap:0.3rem;margin-top:0.15rem;">
          <button onclick="s3CopyUrl('${safeUrl}')" style="padding:0.28rem 0.5rem;background:var(--primary-dim);border:1px solid rgba(168,85,247,0.4);border-radius:5px;color:var(--primary);font-size:0.62rem;cursor:pointer;font-family:var(--font-display);font-weight:700;letter-spacing:0.05em;transition:background 0.15s;" onmouseover="this.style.background='rgba(168,85,247,0.25)'" onmouseout="this.style.background='var(--primary-dim)'">COPY URL</button>
          <button onclick="s3DeleteImage('${safeKey}',this)" style="padding:0.28rem 0.5rem;background:var(--danger-dim);border:1px solid rgba(239,68,68,0.3);border-radius:5px;color:var(--danger);font-size:0.62rem;cursor:pointer;font-family:var(--font-display);font-weight:700;letter-spacing:0.05em;transition:background 0.15s;" onmouseover="this.style.background='rgba(239,68,68,0.2)'" onmouseout="this.style.background='var(--danger-dim)'">DELETE</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

window.s3FilterGrid = function(q) {
  const filtered = q ? _s3AllImages.filter(k => k.toLowerCase().includes(q.toLowerCase())) : _s3AllImages;
  document.getElementById('s3-status').textContent = q
    ? `${filtered.length} of ${_s3AllImages.length} images`
    : `${_s3AllImages.length} image${_s3AllImages.length !== 1 ? 's' : ''} found`;
  s3RenderGrid(filtered);
};

window.s3CopyUrl = function(url) {
  navigator.clipboard.writeText(url)
    .then(() => { /* flash handled by the button hover */ })
    .catch(() => prompt('Copy this URL:', url));
};

window.s3DeleteImage = async function(key, btn) {
  if (!confirm(`Delete "${key.split('/').pop()}"?\nThis cannot be undone.`)) return;
  btn.disabled = true; btn.textContent = '…';
  try {
    const res = await _s3Fetch('DELETE', key, null, null, null);
    if (!res.ok && res.status !== 204) throw new Error(`HTTP ${res.status}`);
    _s3AllImages = _s3AllImages.filter(k => k !== key);
    document.getElementById('s3-status').textContent = `${_s3AllImages.length} image${_s3AllImages.length !== 1 ? 's' : ''} found`;
    s3FilterGrid(document.getElementById('s3-search').value);
  } catch(e) {
    btn.disabled = false; btn.textContent = 'DELETE';
    alert('Delete failed: ' + e.message);
  }
};

async function s3EnsureCreds() {
  if (_s3Creds && _s3Creds.keyId) return _s3Creds;
  if (window._fetchS3Creds) {
    _s3Creds = await window._fetchS3Creds();
  }
  if (!_s3Creds || !_s3Creds.keyId) throw new Error('Save S3 credentials first.');
  return _s3Creds;
}

function s3ObjectUrl(key) {
  const { region, bucket } = _s3Creds;
  return `https://${bucket}.s3.${region}.amazonaws.com/${key.split('/').map(encodeURIComponent).join('/')}`;
}

function looksLikeImageUrl(url) {
  return /^https?:\/\//i.test((url || '').trim()) && /(\.(png|jpe?g|gif|webp|bmp|svg|ico)(\?.*)?$)/i.test((url || '').trim());
}

function isS3ImageUrl(url) {
  const trimmed = (url || '').trim();
  if (!trimmed) return false;
  if (/\.s3[.-][^/]+\.amazonaws\.com\//i.test(trimmed)) return true;
  if (/s3\.amazonaws\.com\//i.test(trimmed)) return true;
  if (_s3Creds && _s3Creds.bucket && _s3Creds.region) {
    const direct = `https://${_s3Creds.bucket}.s3.${_s3Creds.region}.amazonaws.com/`;
    if (trimmed.startsWith(direct)) return true;
  }
  return false;
}

function s3ProxyImageUrl(url) {
  const parsed = new URL(url);
  const normalized = parsed.protocol === 'https:'
    ? `https://${parsed.host}${parsed.pathname}${parsed.search}`
    : `${parsed.host}${parsed.pathname}${parsed.search}`;
  return `https://wsrv.nl/?url=${encodeURIComponent(normalized)}&default=404`;
}

async function s3FileFromUrl(url) {
  let res;
  try {
    res = await fetch(url);
  } catch (err) {
    res = null;
  }

  if (!res || !res.ok) {
    try {
      res = await fetch(s3ProxyImageUrl(url));
    } catch (err) {
      res = null;
    }
  }

  if (!res || !res.ok) {
    const status = res ? `HTTP ${res.status}` : 'request blocked';
    throw new Error(`Failed to fetch image: ${status}`);
  }

  const blob = await res.blob();
  const type = blob.type || 'image/png';
  if (!type.startsWith('image/')) throw new Error('URL did not return an image');
  const cleanUrl = url.split('?')[0];
  const nameFromUrl = cleanUrl.split('/').pop() || '';
  const extFromUrl = (nameFromUrl.split('.').pop() || '').toLowerCase();
  const ext = extFromUrl && /^[a-z0-9]+$/.test(extFromUrl) ? extFromUrl : s3GuessExtension({ type });
  const base = nameFromUrl.replace(/\.[^.]+$/, '') || 'imported-image';
  return new File([blob], `${base}.${ext}`, { type });
}

function s3GuessExtension(file) {
  const type = (file && file.type) || '';
  if (type === 'image/jpeg') return 'jpg';
  if (type === 'image/png') return 'png';
  if (type === 'image/webp') return 'webp';
  if (type === 'image/gif') return 'gif';
  if (type === 'image/svg+xml') return 'svg';
  if (type === 'image/bmp') return 'bmp';
  if (type === 'image/x-icon') return 'ico';
  return 'png';
}

function s3SafeUploadName(file) {
  var rawName = (file && file.name) ? file.name : "image." + s3GuessExtension(file);
  var parts = rawName.split(".");
  var ext = parts.length > 1 ? parts.pop() : s3GuessExtension(file);
  var base = parts.join(".") || "image";
  var safeBase = base.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/-+/g, "-").replace(/^-|-$/g, "") || "image";
  var safeExt = (ext || s3GuessExtension(file)).toLowerCase().replace(/[^a-z0-9]+/g, "") || "png";
  var prefix = (_s3Creds && _s3Creds.prefix) || "";
  var candidate = safeBase + "." + safeExt;
  if (!_s3AllImages.includes(prefix + candidate)) return candidate;
  var n = 1;
  while (_s3AllImages.includes(prefix + safeBase + "-" + n + "." + safeExt)) n++;
  return safeBase + "-" + n + "." + safeExt;
}

async function s3UploadFile(file) {
  await s3EnsureCreds();
  const prefix = (_s3Creds.prefix || '');
  const key = prefix + s3SafeUploadName(file);
  const ab = await file.arrayBuffer();
  const ct = file.type || 'application/octet-stream';
  const res = await _s3Fetch('PUT', key, null, ab, ct);
  if (!res.ok) {
    const txt = await res.text();
    const msg = txt.match(/<Message>(.*?)<\/Message>/)?.[1] || `HTTP ${res.status}`;
    throw new Error(msg);
  }
  if (!_s3AllImages.includes(key)) _s3AllImages.push(key);
  const s3Status = document.getElementById('s3-status');
  const s3Search = document.getElementById('s3-search');
  if (s3Status && s3Search) {
    s3Status.textContent = `${_s3AllImages.length} image${_s3AllImages.length !== 1 ? 's' : ''} found`;
    s3FilterGrid(s3Search.value);
  }
  return { key, url: s3ObjectUrl(key) };
}

window.s3HandleFiles = function(files) {
  if (!files || !files.length) return;
  s3UploadFiles(Array.from(files));
};

window.s3HandleDrop = function(e) {
  const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
  if (!files.length) return;
  s3UploadFiles(files);
};

async function s3UploadFiles(files) {
  const progressEl = document.getElementById('s3-upload-progress');
  progressEl.style.display = 'block';
  progressEl.innerHTML = '';

  try {
    await s3EnsureCreds();
  } catch (e) {
    progressEl.innerHTML = `<div style="color:var(--danger);font-size:0.78rem;">${escapeHtml(e.message)}</div>`;
    setTimeout(() => { progressEl.style.display = 'none'; progressEl.innerHTML = ''; }, 2500);
    return;
  }

  for (const file of files) {
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:center;gap:0.5rem;padding:0.4rem 0;border-bottom:1px solid var(--border);font-size:0.78rem;';
    row.innerHTML = `<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text);">${escapeHtml(file.name || 'pasted-image')}</span><span class="upl-st" style="color:var(--muted);flex-shrink:0;">Uploading…</span>`;
    progressEl.appendChild(row);
    const stEl = row.querySelector('.upl-st');

    try {
      await s3UploadFile(file);
      stEl.textContent = '✓ Done'; stEl.style.color = '#22c55e';
    } catch(e) {
      stEl.textContent = '✗ ' + e.message; stEl.style.color = 'var(--danger)';
    }
  }

  document.getElementById('s3-file-input').value = '';
  const s3Status = document.getElementById('s3-status');
  const s3Search = document.getElementById('s3-search');
  if (s3Status && s3Search) {
    s3Status.textContent = `${_s3AllImages.length} image${_s3AllImages.length !== 1 ? 's' : ''} found`;
    s3FilterGrid(s3Search.value);
  }
  setTimeout(() => { progressEl.style.display = 'none'; progressEl.innerHTML = ''; }, 5000);
}
</script>

<script>
window.closeAdminPanel    = function() { window.location.href = '/'; };

window.adminHandleShopImgChange = function(input) {
  var value = input.value.trim();
  if (!value || isS3ImageUrl(value) || input.dataset.importing === "true") return;
  var card = input.closest(".admin-card-item");
  var ni = card && card.querySelector(".shop-item-name");
  var name = ni ? ni.value.trim() : "";
  if (!name) return;
  input.dataset.importing = "true";
  (async () => {
    try {
      var file = await s3FileFromUrl(value);
      var safeBase = name.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/-+/g, "-").replace(/^-|-$/g, "") || "image";
      var renamed = new File([file], safeBase + "." + s3GuessExtension(file), { type: file.type });
      var up = await s3UploadFile(renamed); input.value = up.url;
    } catch(e) { console.warn(e); }
    finally { input.dataset.importing = "false"; }
  })();
};
window.adminHandleShopImgPaste = function(e, input) {
  var items = Array.from((e.clipboardData && e.clipboardData.items) || []);
  var img = items.find(function(i) { return i.kind === "file" && i.type.startsWith("image/"); });
  if (!img) return;
  var file = img.getAsFile(); if (!file) return;
  e.preventDefault();
  var card = input.closest(".admin-card-item");
  var ni = card && card.querySelector(".shop-item-name");
  var name = ni ? ni.value.trim() : "";
  var safeBase = name ? name.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/-+/g, "-").replace(/^-|-$/g, "") : "image";
  var renamed = new File([file], safeBase + "." + s3GuessExtension(file), { type: file.type });
  (async () => {
    try { var up = await s3UploadFile(renamed); input.value = up.url; }
    catch(e) { console.warn(e); }
  })();
};
